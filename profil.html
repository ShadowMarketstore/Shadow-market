<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Market - Profil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0d0e12; --cyan: #00f2fe; --rose: #ff0055; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Conteneur principal - Cadrage strict */
        .app-container { width: 90%; max-width: 360px; padding: 20px; text-align: center; }
        
        .header-icon { font-size: 50px; margin-bottom: 10px; }
        h1 { font-size: 1.5rem; margin: 0; color: var(--cyan); }
        .email-display { font-size: 0.9rem; margin-bottom: 20px; opacity: 0.8; }
        
        /* Bloc Boutique */
        .boutique-box { border: 2px solid var(--cyan); border-radius: 15px; padding: 25px; background: rgba(255,255,255,0.02); }
        .points-display { font-size: 3rem; font-weight: bold; color: var(--cyan); margin: 10px 0; }
        
        /* Boutons et Inputs */
        .section-label { text-align: left; font-size: 0.8rem; margin: 15px 0 5px 0; display: block; }
        .btn-echanger { background: var(--cyan); color: #000; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .input-code { width: 100%; padding: 12px; background: #1a1c23; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; text-align: center; }
        .btn-fusion { background: var(--rose); color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        .logout-btn { background: none; border: 1px solid var(--rose); color: var(--rose); width: 100%; padding: 10px; margin-top: 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-icon">💎</div>
        <h1>ESPACE PERSONNEL</h1>
        <div class="email-display" id="user-email">Chargement...</div>
        
        <div class="boutique-box">
            <div class="points-display" id="pts">0</div>
            
            <label class="section-label">1. CONVERTIR MES POINTS</label>
            <button class="btn-echanger" onclick="echanger()">ÉCHANGER</button>
            
            <label class="section-label">2. FUSIONNER UN CODE</label>
            <input type="text" id="code-input" class="input-code" placeholder="Ex: SHADOW-PT-XXXXXX">
            <button class="btn-fusion" onclick="fusionner()">FUSIONNER</button>
        </div>

        <button class="logout-btn" onclick="logout()">DÉCONNEXION</button>
    </div>

    <script>
        const supabase = supabase.createClient("https://jsuvimxjmjiljntmgbzu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4");

        async function updateUI() {
            const { data: { user } } = await supabase.auth.getUser();
            if(user) {
                document.getElementById('user-email').innerText = user.email;
                const { data } = await supabase.from('profiles').select('loyalty_points').eq('id', user.id).single();
                document.getElementById('pts').innerText = data ? data.loyalty_points : 0;
            }
        }

        async function echanger() {
            const { error } = await supabase.rpc('convertir_points_en_code');
            if(error) alert("Erreur : " + error.message); else updateUI();
        }

        async function fusionner() {
            const code = document.getElementById('code-input').value;
            const { error } = await supabase.rpc('fusion_code_secure', { code_input: code });
            if(error) alert("Erreur : " + error.message); else updateUI();
        }

        function logout() { window.location.href = "index.html"; }
        window.onload = updateUI;
    </script>
</body>
</html>
