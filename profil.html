<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace - Shadow Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0d0d0d;
            --cyan-neon: #00ffff;
            --crimson-neon: #ff0055;
            --text-muted: #888;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Barre latérale (Sidebar) d'origine */
        .sidebar {
            width: 60px;
            background: #000;
            border-right: 1px solid #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
        }

        .menu-toggle {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 25px;
        }

        .menu-toggle span {
            display: block;
            height: 3px;
            width: 100%;
            background: var(--cyan-neon);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Conteneur Principal */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
        }

        /* En-tête du solde */
        .points-header-box {
            border: 2px solid var(--cyan-neon);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            background: var(--panel-bg);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .diamond-counter {
            font-size: 3.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 0 10px var(--cyan-neon);
        }

        .hint-text {
            color: #fff;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Sections / Panneaux */
        .panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1a1a1a;
            box-sizing: border-box;
        }

        h2 {
            color: var(--cyan-neon);
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Formulaires et Boutons alignés */
        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        select, input[type="text"] {
            flex: 1;
            background: #151515;
            border: 1px solid var(--cyan-neon);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            min-width: 0;
            box-sizing: border-box;
        }

        input[type="text"] {
            border-color: #333;
        }
        input[type="text"]:focus {
            border-color: var(--crimson-neon);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-cyan { background: var(--cyan-neon); color: #000; }
        .btn-crimson { background: var(--crimson-neon); color: #fff; }

        .separator {
            height: 1px;
            background: #222;
            margin: 20px 0;
        }

        .orders-empty-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="main-content">
        <div class="container">

            <div class="points-header-box">
                <div class="diamond-counter">
                    💎 <span id="user-points-display">0</span>
                </div>
                <div class="hint-text">
                    💡 Échangez vos points contre des codes ou fusionnez-les !
                </div>
            </div>

            <div class="panel">
                <h2>💎 Boutique de points & Fusion</h2>

                <h3>1. Convertir mes points en code promo</h3>
                <div class="flex-row">
                    <select id="select-points-tier">
                        <option value="2">2 Points</option>
                        <option value="5">5 Points</option>
                        <option value="10">10 Points</option>
                        <option value="25">25 Points</option>
                        <option value="50">50 Points</option>
                        <option value="100">100 Points</option>
                    </select>
                    <button class="btn btn-cyan" id="btn-exchange" onclick="exchangePointsForCode()">Échanger</button>
                </div>

                <div class="separator"></div>

                <h3>2. Reconvertir un code en points (Fusion)</h3>
                <div class="flex-row">
                    <input type="text" id="input-fusion-code" placeholder="Ex: SHADOW-PT-X...">
                    <button class="btn btn-crimson" id="btn-fusion" onclick="fusionCodeToPoints()">Fusionner</button>
                </div>
            </div>

            <div class="panel">
                <h2>📦 Mes commandes</h2>
                <div class="orders-empty-text">
                    Vos produits achetés et clés d'activation s'afficheront ici.
                </div>
            </div>

        </div>
    </div>

    <script>
        // Initialisation de Supabase
        const db = supabase.createClient(
          'https://jsuvimxjmjiljntmgbzu.supabase.co',
          'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        let userId = null;

        // Récupération automatique de la session de l'utilisateur connecté au chargement
        window.onload = async () => {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                window.location.href = "login.html"; 
                return;
            }

            userId = session.user.id; 
            await refreshPoints();
        };

        function makeRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Récupère tes points depuis la colonne exacte 'loyalty_points'
        async function refreshPoints() {
            if (!userId) return 0;
            try {
                const { data, error } = await db
                    .from('profiles')
                    .select('loyalty_points')
                    .eq('id', userId)
                    .single();

                if (error) throw error;

                if (data) {
                    const display = document.getElementById('user-points-display');
                    if (display) display.innerText = data.loyalty_points;
                    return data.loyalty_points;
                }
            } catch (err) {
                console.error("Erreur de récupération des points:", err);
                return 0;
            }
        }

        // Action 1 : Convertir points -> Code Promo
        async function exchangePointsForCode() {
            const pointsToSpend = parseInt(document.getElementById('select-points-tier').value);
            const btn = document.getElementById('btn-exchange');

            if (btn) btn.disabled = true;
            const currentPts = await refreshPoints();

            if (currentPts < pointsToSpend) {
                alert("❌ Solde de points insuffisant pour ce palier.");
                if (btn) btn.disabled = false;
                return;
            }

            const generatedCode = "SHADOW-PT-" + makeRandomString(6);

            try {
                // Déduction des points
                const { error: updateError } = await db
                    .from('profiles')
                    .update({ loyalty_points: currentPts - pointsToSpend })
                    .eq('id', userId);

                if (updateError) throw updateError;

                // Création du code promo
                const { error: insertError } = await db
                    .from('codes_points')
                    .insert([
                        { code: generatedCode, points: pointsToSpend, used: false }
                    ]);

                if (insertError) throw insertError;

                alert(`🎉 Succès ! Code généré : ${generatedCode}\nIl vous donne droit à -${pointsToSpend}% de réduction.`);
                await refreshPoints();

            } catch (err) {
                console.error(err);
                alert("Une erreur est survenue lors de l'échange.");
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        // Action 2 : Fusionner un code promo en points
        async function fusionCodeToPoints() {
            const codeSaisi = document.getElementById('input-fusion-code').value.trim();
            const btn = document.getElementById('btn-fusion');

            if (!codeSaisi) {
                alert("Veuillez entrer un code à fusionner.");
                return;
            }

            if (btn) btn.disabled = true;

            try {
                // Vérifier si le code existe et n'est pas expiré/utilisé
                const { data: codeData, error: codeError } = await db
                    .from('codes_points')
                    .select('*')
                    .eq('code', codeSaisi)
                    .eq('used', false)
                    .single();

                if (codeError || !codeData) {
                    alert("❌ Ce code est invalide, inexistant ou a déjà été consommé.");
                    if (btn) btn.disabled = false;
                    return;
                }

                const currentPts = await refreshPoints();

                // Désactivation du code
                const { error: disableError } = await db
                    .from('codes_points')
                    .update({ used: true })
                    .eq('id', codeData.id);

                if (disableError) throw disableError;

                // Crédit des points sur le profil
                const { error: profileUpdateError } = await db
                    .from('profiles')
                    .update({ loyalty_points: currentPts + codeData.points })
                    .eq('id', userId);

                if (profileUpdateError) throw profileUpdateError;

                alert(`✨ Fusion réussie ! +${codeData.points} points ont été recrédités sur votre compte.`);
                document.getElementById('input-fusion-code').value = "";
                await refreshPoints();

            } catch (err) {
                console.error(err);
                alert("Une erreur technique s'est produite lors de la fusion.");
            } finally {
                if (btn) btn.disabled = false;
            }
        }
    </script>
</body>
</html>
