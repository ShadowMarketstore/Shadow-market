<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier - Shadow Market</title>
    <!-- Ajout du CDN Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .item-card { border: 1px solid #00ffff; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; background: #111; }
        .item-info { flex-grow: 1; margin-left: 15px; }
        .remove-btn { color: #ff3333; font-size: 1.5em; cursor: pointer; border: none; background: none; font-weight: bold; padding: 0 10px; }
        
        .promo-section { margin-top: 15px; display: flex; gap: 5px; }
        input[type="text"] { padding: 10px; background: #222; border: 1px solid #00ffff; color: white; border-radius: 4px; width: 60%; }
        .btn-promo { padding: 10px; background: #00ffff; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        .btn-paiement { width: 100%; padding: 15px; background: #ff3333; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1em; }
        .total-section { font-size: 1.4em; font-weight: bold; margin-top: 20px; text-align: center; color: #00ffff; }
    </style>
</head>
<body>

    <h1>Mon Panier</h1>
    <div id="panier-liste"></div>
    
    <!-- Code Créateur -->
    <div class="promo-section">
        <input type="text" id="code-createur-input" placeholder="Code créateur...">
        <button class="btn-promo" onclick="appliquerCreateur()">Appliquer</button>
    </div>
    <p id="msg-createur" style="font-size: 0.8em; margin-top: 5px;"></p>

    <!-- Code Points -->
    <div class="promo-section">
        <input type="text" id="code-points-input" placeholder="Code points...">
        <button class="btn-promo" onclick="appliquerPoints()">Appliquer</button>
    </div>
    <p id="msg-points" style="font-size: 0.8em; margin-top: 5px;"></p>

    <div class="total-section">
        Total : <span id="total-somme">0.00</span> €
    </div>

    <button class="btn-paiement" onclick="versPaiement()">PASSER AU PAIEMENT</button>

    <script>
        // Initialisation du client Supabase
        const db = supabase.createClient(
          'https://jsuvimxjmjiljntmgbzu.supabase.co',
          'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
        );

        let prixBaseTotal = 0;
        let tauxCreateur = 0;
        let remisePoints = 0; 

        const codesCreateurs = { "SHADOW10": 0.10, "NINJA20": 0.20 };

        function chargerPanier() {
            let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
            let liste = document.getElementById('panier-liste');
            prixBaseTotal = 0;
            liste.innerHTML = '';

            panier.forEach((p, index) => {
                const prix = parseFloat(p.price) || 0;
                prixBaseTotal += prix;
                liste.innerHTML += `
                    <div class="item-card">
                        <img src="${p.image_url || ''}" width="50" style="border-radius: 4px;">
                        <div class="item-info">
                            <strong>${p.name || 'Produit'}</strong><br>${prix.toFixed(2)} €
                        </div>
                        <button class="remove-btn" onclick="supprimerArticle(${index})">X</button>
                    </div>
                `;
            });
            calculerTotal();
        }

        function appliquerCreateur() {
            const code = document.getElementById('code-createur-input').value.toUpperCase();
            const msg = document.getElementById('msg-createur');
            tauxCreateur = codesCreateurs[code] || 0;
            msg.innerText = tauxCreateur > 0 ? "Code appliqué !" : "Code invalide";
            msg.style.color = tauxCreateur > 0 ? "#00ff00" : "#ff3333";
            calculerTotal();
        }

        async function appliquerPoints() {
            const codeSaisi = document.getElementById('code-points-input').value.trim();
            const msg = document.getElementById('msg-points');

            if (!codeSaisi) {
                msg.innerText = "Veuillez entrer un code.";
                msg.style.color = "#ff3333";
                return;
            }

            try {
                const { data, error } = await db
                    .from('codes_promo')
                    .select('reduction_value')
                    .eq('code', codeSaisi)
                    .single();

                if (error || !data) {
                    remisePoints = 0;
                    msg.innerText = "Code points invalide ou expiré";
                    msg.style.color = "#ff3333";
                } else {
                    // Supposition : reduction_value est stocké en pourcentage (ex: 15 pour 15%)
                    remisePoints = parseFloat(data.reduction_value) / 100; 
                    
                    msg.innerText = `Code appliqué ! Remise de ${(remisePoints * 100).toFixed(0)}% activée.`;
                    msg.style.color = "#00ff00";
                }
            } catch (err) {
                console.error(err);
                msg.innerText = "Erreur de connexion à la base de données";
                msg.style.color = "#ff3333";
            }

            calculerTotal();
        }

        // CORRIGÉ : La fonction possède désormais la bonne orthographe pour s'exécuter correctement
        function calculerTotal() {
            let totalFinal = prixBaseTotal - (prixBaseTotal * tauxCreateur) - (prixBaseTotal * remisePoints);
            document.getElementById('total-somme').innerText = Math.max(totalFinal, 0).toFixed(2);
        }

        function supprimerArticle(index) {
            let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
            panier.splice(index, 1);
            localStorage.setItem('monPanier', JSON.stringify(panier));
            chargerPanier();
        }

        function versPaiement() {
            localStorage.setItem('totalPanier', document.getElementById('total-somme').innerText);
            localStorage.setItem('codePointsApplique', document.getElementById('code-points-input').value.trim());
            window.location.href = 'paiement.html';
        }

        window.onload = chargerPanier;
    </script>
</body>
</html>
