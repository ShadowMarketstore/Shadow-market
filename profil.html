<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Personnel - Shadow Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #0d0e12; --accent-color: #00f2fe; --crimson-neon: #ff0055; --text-muted: #a0a0ab; }
        body { margin: 0; background: var(--bg-color); color: #fff; font-family: sans-serif; }
        
        /* Menu Hamburger */
        .menu-toggle { position: absolute; top: 20px; left: 20px; cursor: pointer; z-index: 1000; }
        .menu-toggle span { display: block; width: 30px; height: 3px; background: var(--accent-color); margin: 6px 0; transition: 0.3s; }
        
        /* Menu Coulissant */
        .nav-menu { position: fixed; left: -100%; top: 0; width: 250px; height: 100%; background: #12141a; transition: 0.3s; padding: 60px 20px; z-index: 999; border-right: 2px solid var(--accent-color); }
        .nav-menu.open { left: 0; }
        .nav-menu a { display: block; color: #fff; text-decoration: none; padding: 15px 0; font-size: 18px; border-bottom: 1px solid #333; }

        /* Conteneur Principal */
        .wrapper { display: flex; flex-direction: column; align-items: center; padding-top: 80px; }
        .card { width: 90%; max-width: 400px; border: 2px solid var(--accent-color); border-radius: 20px; padding: 20px; text-align: center; }
        .debug-console { margin-top: 30px; width: 90%; max-width: 400px; padding: 10px; border: 1px dashed var(--crimson-neon); font-size: 11px; color: #ff99bb; }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="document.getElementById('nav').classList.toggle('open')">
        <span></span><span></span><span></span>
    </div>

    <div id="nav" class="nav-menu">
        <a href="index.html">🏠 Accueil</a>
        <a href="profil.html">👤 Profil</a>
        <a href="#" onclick="logout()">⏻ Déconnexion</a>
    </div>

    <div class="wrapper">
        <div class="card">
            <h2 style="color: var(--accent-color);">MON PROFIL</h2>
            <div id="user-info">Chargement...</div>
            <div style="font-size: 40px; margin: 20px;">💎 <span id="points-display">0</span></div>
            <button onclick="logout()" style="width: 100%; padding: 10px; background: var(--crimson-neon); border: none; color: #fff; border-radius: 5px;">DÉCONNEXION</button>
        </div>
        <div class="debug-console" id="debug-log">Initialisation...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://jsuvimxjmjiljntmgbzu.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4"; 

        async function initApp() {
            const logBox = document.getElementById('debug-log');
            try {
                const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data: { session }, error } = await client.auth.getSession();
                
                if (session) {
                    document.getElementById('user-info').textContent = session.user.email;
                    const { data } = await client.from('profiles').select('loyalty_points').eq('id', session.user.id).single();
                    document.getElementById('points-display').textContent = data ? data.loyalty_points : 0;
                    logBox.textContent = "✅ Système en ligne.";
                } else {
                    logBox.textContent = "❌ Non connecté.";
                }
            } catch (err) {
                logBox.textContent = "💥 Erreur : " + err.message;
            }
        }

        function logout() {
            window.location.href = "index.html";
        }

        window.onload = initApp;
    </script>
</body>
</html>
