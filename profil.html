<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Personnel - Shadow Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #111115;
            --accent-color: #00f2fe;
            --text-color: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #22222b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .user-email {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            word-break: break-all;
        }

        .points-box {
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            background: rgba(0, 242, 254, 0.03);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .points-count {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            margin-top: 5px;
        }

        .points-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .shop-section {
            text-align: left;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .shop-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #0a0a0c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #0a0a0c;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Espace Personnel</h1>
            <div class="subtitle">Shadow Market</div>
            
            <div class="user-email" id="user-email">Chargement...</div>

            <div class="points-box">
                <span style="font-size: 24px;">💎</span>
                <div class="points-count" id="points-display">0</div>
                <div class="points-label">💡 Échangez vos points contre des codes ou fusionnez-les !</div>
            </div>

            <div class="shop-section">
                <div class="shop-title">💎 Boutique de points & Fusion</div>
                
                <div class="form-group">
                    <label for="points-tier-select">1. Convertir mes points en code promo</label>
                    <select id="points-tier-select">
                        <option value="2">2 Points</option>
                        <option value="5">5 Points</option>
                        <option value="10">10 Points</option>
                    </select>
                </div>

                <button class="btn" id="btn-convert-to-code">Échanger</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION SUPABASE (Remplacer par tes vraies clés si nécessaire)
        const SUPABASE_URL = "https://shadow-market-ypg1.onrender.com"; // Ton URL de redirection ou proxy render
        const SUPABASE_ANON_KEY = "TON_ANON_KEY_ICI"; 

        // Initialisation de Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const db = supabase; 

        let userId = null;

        // Fonction pour récupérer et afficher les points en temps réel
        async function refreshPoints() {
            if (!userId) return;
            try {
                // Lecture basée sur ta colonne exacte : loyalty_points
                const { data, error } = await db
                    .from('profiles')
                    .select('loyalty_points')
                    .eq('id', userId)
                    .single();

                if (error) throw error;

                document.getElementById('points-display').textContent = data.loyalty_points || 0;
            } catch (err) {
                console.error("Erreur lors de la récupération des points:", err.message);
            }
        }

        // Vérification de la session utilisateur au chargement
        async function checkUserSession() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) throw error;

                if (!session) {
                    // Pas connecté -> Redirection vers la page de connexion
                    window.location.href = "connexion.html"; 
                    return;
                }

                userId = session.user.id;
                document.getElementById('user-email').textContent = `Email : ${session.user.email}`;
                
                // Charger les points de l'utilisateur
                await refreshPoints();

            } catch (err) {
                alert("Erreur de session : " + err.message);
                window.location.href = "connexion.html";
            }
        }

        // ÉTAPE 1 : Échanger des points contre un code unique
        document.getElementById('btn-convert-to-code').addEventListener('click', async () => {
            const btn = document.getElementById('btn-convert-to-code');
            const pointsToSpend = parseInt(document.getElementById('points-tier-select').value);

            btn.disabled = true;

            try {
                // 1. Lire le solde actuel sur la colonne 'loyalty_points'
                const { data: profileData, error: profileError } = await db
                    .from('profiles')
                    .select('loyalty_points')
                    .eq('id', userId)
                    .single();

                if (profileError) throw profileError;
                const currentPts = profileData.loyalty_points || 0;

                // Vérifier si l'utilisateur a assez de points
                if (currentPts < pointsToSpend) {
                    alert(`Points insuffisants ! Il vous faut au moins ${pointsToSpend} points.`);
                    return;
                }

                // Générer un code au format SHADOW-PT-XXXXXX
                const uniqueCode = "SHADOW-PT-" + Math.random().toString(36).substring(2, 8).toUpperCase();

                // 2. Insérer le code dans la table 'codes_points' avec tes colonnes réelles
                const { error: insertError } = await db
                    .from('codes_points')
                    .insert([{
                        code: uniqueCode,                  // Ta nouvelle colonne text
                        points_required: pointsToSpend,   // Ta colonne int8 existante
                        user_id: userId,                  // Ta colonne int8/uuid existante
                        used: false                        // Ta nouvelle colonne bool
                    }]);

                if (insertError) throw insertError;

                // 3. Déduire les points du profil de l'utilisateur
                const { error: updateError } = await db
                    .from('profiles')
                    .update({ loyalty_points: currentPts - pointsToSpend })
                    .eq('id', userId);

                if (updateError) {
                    // Annulation (Rollback) de sécurité si la déduction échoue
                    await db.from('codes_points').delete().eq('code', uniqueCode);
                    throw updateError;
                }

                // Message de succès avec le code généré
                alert(`Succès ! Votre code de ${pointsToSpend} points a été généré :\n\n👉 ${uniqueCode}`);
                
                // Actualiser l'affichage des points sur l'écran
                await refreshPoints();

            } catch (err) {
                alert("Erreur lors de la génération : " + err.message);
            } finally {
                btn.disabled = false;
            }
        });

        // Lancer la vérification au chargement de la page
        window.addEventListener('DOMContentLoaded', checkUserSession);
    </script>
</body>
</html>
