<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Personnel - Shadow Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #111115;
            --accent-color: #00f2fe;
            --crimson-neon: #ff0055;
            --text-color: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #22222b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .user-email {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            word-break: break-all;
        }

        .points-box {
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            background: rgba(0, 242, 254, 0.03);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .points-count {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            margin-top: 5px;
        }

        .points-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .shop-section {
            text-align: left;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .shop-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background-color: #0a0a0c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #0a0a0c;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

        .btn-logout {
            background-color: transparent;
            color: var(--crimson-neon);
            border: 1px solid var(--crimson-neon);
            margin-top: 15px;
        }
        .btn-logout:hover {
            background-color: rgba(255, 0, 85, 0.1);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Espace Personnel</h1>
            <div class="subtitle">Shadow Market</div>
            
            <div class="user-email" id="user-email">Chargement...</div>

            <div class="points-box">
                <span style="font-size: 24px;">💎</span>
                <div class="points-count" id="points-display">0</div>
                <div class="points-label">💡 Échangez vos points contre des codes ou fusionnez-les !</div>
            </div>

            <div class="shop-section">
                <div class="shop-title">💎 Boutique de points & Fusion</div>
                
                <div class="form-group">
                    <label for="points-tier-select">1. Convertir mes points en code promo</label>
                    <select id="points-tier-select">
                        <option value="2">2 Points</option>
                        <option value="5">5 Points</option>
                        <option value="10">10 Points</option>
                    </select>
                </div>
                <button class="btn" id="btn-convert-to-code">Échanger</button>

                <hr>

                <div class="form-group">
                    <label for="code-to-reconvert">2. Reconvertir un code en points (Fusion)</label>
                    <input type="text" id="code-to-reconvert" placeholder="Ex: SHADOW-PT-XXXXXX">
                </div>
                <button class="btn" id="btn-reconvert-to-points" style="background-color: var(--crimson-neon); color: #fff;">Fusionner</button>
                
                <hr>
                
                <button class="btn btn-logout" onclick="logout()">⏻ Déconnexion</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jsuvimxjmjiljntmgbzu.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX"; 

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const db = supabase; 

        let userId = null;

        async function refreshPoints() {
            if (!userId) return;
            try {
                const { data, error } = await db
                    .from('profiles')
                    .select('loyalty_points')
                    .eq('id', userId)
                    .single();

                if (error) throw error;
                document.getElementById('points-display').textContent = data.loyalty_points || 0;
            } catch (err) {
                console.error("Erreur points:", err.message);
            }
        }

        async function checkUserSession() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (!session) {
                    window.location.href = "login.html"; 
                    return;
                }

                userId = session.user.id;
                document.getElementById('user-email').textContent = `Email : ${session.user.email}`;
                await refreshPoints();
            } catch (err) {
                window.location.href = "login.html";
            }
        }

        // Action Étape 1 : Échanger
        document.getElementById('btn-convert-to-code').addEventListener('click', async () => {
            const btn = document.getElementById('btn-convert-to-code');
            const pointsToSpend = parseInt(document.getElementById('points-tier-select').value);
            btn.disabled = true;

            try {
                const { data: profileData, error: profileError } = await db
                    .from('profiles')
                    .select('loyalty_points')
                    .eq('id', userId)
                    .single();

                if (profileError) throw profileError;
                const currentPts = profileData.loyalty_points || 0;

                if (currentPts < pointsToSpend) {
                    alert(`Points insuffisants ! Il vous faut au moins ${pointsToSpend} points.`);
                    return;
                }

                const uniqueCode = "SHADOW-PT-" + Math.random().toString(36).substring(2, 8).toUpperCase();

                const { error: insertError } = await db
                    .from('codes_points')
                    .insert([{
                        code: uniqueCode,
                        points_required: pointsToSpend,
                        user_id: userId,
                        used: false
                    }]);

                if (insertError) throw insertError;

                const { error: updateError } = await db
                    .from('profiles')
                    .update({ loyalty_points: currentPts - pointsToSpend })
                    .eq('id', userId);

                if (updateError) {
                    await db.from('codes_points').delete().eq('code', uniqueCode);
                    throw updateError;
                }

                alert(`Succès ! Code généré :\n\n👉 ${uniqueCode}`);
                await refreshPoints();
            } catch (err) {
                alert("Erreur : " + err.message);
            } finally {
                btn.disabled = false;
            }
        });

        // Action Étape 2 : Fusionner
        document.getElementById('btn-reconvert-to-points').addEventListener('click', async () => {
            const btn = document.getElementById('btn-reconvert-to-points');
            const inputCode = document.getElementById('code-to-reconvert').value.trim().toUpperCase();

            if (!inputCode) {
                alert("Veuillez entrer un code à reconvertir.");
                return;
            }

            btn.disabled = true;

            try {
                const { data: pointsCredited, error } = await db.rpc('fusion_code_secure', {
                    user_id_param: userId,
                    input_code_param: inputCode
                });

                if (error) throw error;

                alert(`Fusion réussie ! +${pointsCredited} points ajoutés.`);
                document.getElementById('code-to-reconvert').value = "";
                await refreshPoints();
            } catch (err) {
                alert("Erreur lors de la fusion : " + err.message);
            } finally {
                btn.disabled = false;
            }
        });

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        }

        window.addEventListener('DOMContentLoaded', checkUserSession);
    </script>
</body>
</html>
