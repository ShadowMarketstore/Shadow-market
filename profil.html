<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Profil</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
    .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 2000; cursor: pointer; font-size: 30px; color: #00ffff; }
    .sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #111; border-right: 2px solid #00ffff; transition: 0.3s; z-index: 1500; padding-top: 80px; }
    .sidebar.active { left: 0; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 20px; color: white; text-decoration: none; font-size: 1.2em; border-bottom: 1px solid #222; cursor: pointer; }
    .sidebar a:hover { background: #222; color: #00ffff; }
    .main-content-wrapper { max-width: 500px; margin: 80px auto 0 auto; background: #111; padding: 30px; border: 2px solid #00ffff; border-radius: 20px; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); text-align: center; }
    h1 { color: #00ffff; text-transform: uppercase; letter-spacing: 2px; }
    .loyalty-card { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); border: 2px solid #00ffff; border-radius: 15px; padding: 20px; margin: 20px auto; }
    .loyalty-value { font-size: 2.5em; font-weight: bold; color: #fff; text-shadow: 0 0 10px #00ffff; }
    .info-msg { color: #00ffff; font-size: 0.9em; margin-top: 10px; font-style: italic; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
    .modal-content { background: #111; padding: 30px; border: 2px solid #00ffff; border-radius: 20px; text-align: center; width: 300px; }
    input { background: #000; border: 1px solid #00ffff; color: #fff; padding: 10px; width: 80%; margin: 10px 0; border-radius: 5px; text-align: center; }
    .btn { background: #00ffff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="sidebar" id="sidebar">
    <a href="index.html">🏠 Accueil</a>
    <a href="#">📚 Bibliothèque</a>
    <a onclick="openModal()">💎 Points : <span id="user-points">0</span></a>
    <a href="#">📜 Historique</a>
    <a onclick="logout()" style="color: #DC143C;">⏻ Déconnexion</a>
  </div>

  <main class="main-content-wrapper">
    <h1>Espace Personnel</h1>
    <div class="loyalty-card">
        <div class="loyalty-value">💎 <span id="user-points-display">0</span></div>
        <div class="info-msg">💡 Vous pouvez convertir vos points en réductions (1 point = 1% de remise) !</div>
    </div>
    <p>Email : <strong id="displayEmail"></strong></p>
  </main>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h3>Convertir mes points</h3>
      <input type="number" id="ptsInput" placeholder="Nombre de points">
      <br>
      <button class="btn" id="genCodeBtn" onclick="generateCode()">Générer le code</button>
      <button class="btn" style="background:#444;" onclick="closeModal()">Fermer</button>
      <p id="resultCode" style="margin-top:20px; color:#00ffff; font-weight:bold;"></p>
    </div>
  </div>

  <script>
    const db = supabase.createClient(
      'https://jsuvimxjmjiljntmgbzu.supabase.co',
      'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
    );

    let userId = null;
    let currentEmail = null;

    // SÉCURITÉ : Vérification de session au démarrage
    window.onload = async () => {
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            window.location.href = "login.html";
            return;
        }

        userId = session.user.id;
        currentEmail = session.user.email;
        document.getElementById('displayEmail').innerText = currentEmail;

        await refreshPoints();
    };

    // Recharge le total des points cumulés depuis ta nouvelle table 'codes_points'
    async function refreshPoints() {
        // Optionnel : On conserve aussi la lecture de ton solde global actuel si tu as une table 'profiles' ou 'users'
        // Ici on va d'abord chercher s'il y a des lignes dans codes_points pour cet utilisateur
        const { data, error } = await db
            .from('codes_points')
            .select('points_required')
            .eq('user_id', userId);

        if (!error && data) {
            // Fait la somme de tous les points de la table pour cet utilisateur
            const totalPoints = data.reduce((sum, row) => sum + (row.points_required || 0), 0);
            
            document.getElementById('user-points').innerText = totalPoints;
            document.getElementById('user-points-display').innerText = totalPoints;
        } else {
            // Si aucune ligne ou erreur, on tente de lire l'ancien champ 'points' par sécurité
            const { data: userData } = await db.from('users').select('points').eq('email', currentEmail).single();
            if (userData) {
                document.getElementById('user-points').innerText = userData.points;
                document.getElementById('user-points-display').innerText = userData.points;
            }
        }
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // Génère le code et l'enregistre directement dans 'codes_points'
    async function generateCode() {
        const btn = document.getElementById('genCodeBtn');
        const pts = parseInt(document.getElementById('ptsInput').value);
        const currentPts = parseInt(document.getElementById('user-points').innerText);

        // Si tu veux utiliser tes points pour Générer un code, tu dois en avoir assez sur ton solde global.
        // Note : Si ton système retire des points globaux, on met à jour la table 'users' ET on ajoute une trace ou un code dans codes_points.
        if (!pts || pts > currentPts || pts <= 0) {
            alert("Points insuffisants ou invalides");
            return;
        }

        btn.disabled = true;

        try {
            // Simulation ou création d'une nouvelle ligne d'avantage de points
            // Ici, on insère la ligne dans 'codes_points' avec le coût en points et la valeur de réduction associée
            const { error: insertError } = await db.from('codes_points').insert([
                { 
                    user_id: userId, 
                    points_required: pts, 
                    reduction_value: parseFloat(pts) // 1 point = 1% de remise
                }
            ]);
            if (insertError) throw insertError;

            // Optionnel : Si tu as un solde global à déduire dans la table 'users'
            const { error: updateError } = await db.from('users')
                .update({ points: currentPts - pts })
                .eq('email', currentEmail);
            
            // Si la table users n'existe plus ou est migrée, supprime ou adapte cette ligne ci-dessus.

            document.getElementById('resultCode').innerText = "Points enregistrés avec succès !";
            await refreshPoints(); 
            document.getElementById('ptsInput').value = '';
        } catch (err) {
            alert("Erreur : " + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    async function logout() {
        await db.auth.signOut();
        window.location.href = 'index.html';
    }
  </script>
</body>
</html>
