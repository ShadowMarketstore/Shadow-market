<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Profil</title>
  <style>
    body { background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; }
    
    .main-content-wrapper { 
        max-width: 500px; 
        margin: 50px auto 0 auto; 
        background: #111; 
        padding: 30px; 
        border: 2px solid #00ffff; 
        border-radius: 20px; 
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        text-align: center;
    }
    
    h1 { color: #00ffff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    
    #userInfo { 
        margin: 25px 0; 
        padding: 20px; 
        border: 1px solid #00ffff !important; 
        border-radius: 10px; 
        background: #0a0a0a; 
        box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
    }
    
    .submit-btn { 
        background: #DC143C; 
        color: white; 
        border: none; 
        padding: 12px 30px; 
        border-radius: 5px; 
        font-weight: bold; 
        cursor: pointer; 
        width: 100%;
        font-size: 1em;
        transition: background 0.3s;
    }
    .submit-btn:hover { background: #ff1a4a; }
  </style>
</head>
<body>

  <script>
    // Vérification de connexion simple
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = "login.html";
    }
  </script>

  <main class="main-content-wrapper">
    <h1>Espace Personnel</h1>
    <p>Bienvenue sur ton profil !</p>
    
    <div id="userInfo">
      <p>Email : <strong id="displayEmail"></strong></p>
    </div>

    <button onclick="logout()" class="submit-btn">DÉCONNEXION</button>
  </main>

  <script>
    // Affichage de l'email
    document.getElementById('displayEmail').innerText = localStorage.getItem('userEmail') || 'Non défini';

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
