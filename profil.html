<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Personnel - Shadow Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #111115;
            --accent-color: #00f2fe;
            --crimson-neon: #ff0055;
            --text-color: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #22222b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        /* --- BARRE SUPÉRIEURE AVEC LE BOUTON 3 BARRES --- */
        .navbar {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .navbar-brand span { color: var(--accent-color); }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--text-color);
            border-radius: 3px;
        }

        /* --- MENU LATÉRAL COULISSANT --- */
        .nav-menu {
            position: fixed;
            top: 60px;
            left: -100%;
            width: 280px;
            height: calc(100vh - 60px);
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            transition: left 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            z-index: 999;
            display: flex;
            flex-direction: column;
        }

        .nav-menu.open {
            left: 0;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .menu-item a:hover, .menu-item.active a {
            color: #fff;
            background: rgba(0, 242, 254, 0.05);
            border-left: 4px solid var(--accent-color);
        }

        .menu-footer {
            margin-top: auto;
            padding-bottom: 20px;
        }

        /* --- CONTENU --- */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 5px 0; }
        .subtitle { color: var(--accent-color); font-size: 13px; font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
        
        .user-email { 
            font-size: 14px; 
            color: var(--text-color); 
            margin-bottom: 25px; 
            background: #0a0a0c;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            word-break: break-all;
        }

        .points-box {
            border: 2px solid var(--accent-color);
            border-radius: 16px;
            padding: 25px 15px;
            margin-bottom: 30px;
            background: rgba(0, 242, 254, 0.02);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
        }

        .points-count { 
            font-size: 56px; 
            font-weight: 800; 
            color: #fff; 
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6); 
            margin: 10px 0;
        }
        
        .points-label { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

        .shop-section { text-align: left; border-top: 1px solid var(--border-color); padding-top: 25px; }
        .shop-title { font-size: 13px; font-weight: bold; color: var(--accent-color); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 20px; }
        
        label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }

        select, input {
            width: 100%;
            padding: 14px;
            background-color: #0a0a0c;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        select:focus, input:focus { border-color: var(--accent-color); }

        .btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 10px;
            color: #0a0a0c;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-logout { 
            background-color: transparent; 
            color: var(--crimson-neon); 
            border: 1px solid var(--crimson-neon); 
        }
        hr { border: 0; border-top: 1px solid var(--border-color); margin: 25px 0; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="navbar-brand">Shadow<span>Market</span></div>
        <button class="menu-toggle" id="menu-btn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="nav-menu" id="side-menu">
        <ul class="menu-list">
            <li class="menu-item"><a href="index.html">🏠 Accueil</a></li>
            <li class="menu-item"><a href="#">🛒 Boutique</a></li>
            <li class="menu-item active"><a href="profil.html">👤 Mon Profil</a></li>
            <li class="menu-item"><a href="#">📦 Mes Commandes</a></li>
            <li class="menu-item"><a href="#">💎 Mes Points</a></li>
        </ul>
        <div class="menu-footer">
            <button class="btn btn-logout" onclick="logout()">⏻ Déconnexion</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="card">
                <h1>Espace Personnel</h1>
                <div class="subtitle">Shadow Market</div>
                
                <div class="user-email" id="user-email">Chargement de l'email...</div>

                <div class="points-box">
                    <span style="font-size: 32px;">💎</span>
                    <div class="points-count" id="points-display">...</div>
                    <div class="points-label">💡 Échangez vos points contre des codes ou fusionnez-les !</div>
                </div>

                <div class="shop-section">
                    <div class="shop-title">💎 Boutique de points & Fusion</div>
                    
                    <div class="form-group">
                        <label for="points-tier-select">1. Convertir mes points en code promo</label>
                        <select id="points-tier-select">
                            <option value="2">2 Points</option>
                            <option value="5">5 Points</option>
                            <option value="10">10 Points</option>
                        </select>
                    </div>
                    <button class="btn" id="btn-convert-to-code">Échanger</button>

                    <hr>

                    <div class="form-group">
                        <label for="code-to-reconvert">2. Reconvertir un code en points (Fusion)</label>
                        <input type="text" id="code-to-reconvert" placeholder="Ex: SHADOW-PT-XXXXXX">
                    </div>
                    <button class="btn" id="btn-reconvert-to-points" style="background-color: var(--crimson-neon); color: #fff;">Fusionner</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://jsuvimxjmjiljntmgbzu.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX"; 

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let userId = null;

        // Fonction Menu Burger (3 barres)
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('open');
        }

        // Récupération stable de tes points
        async function refreshPoints() {
            if (!userId) return;
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('loyalty_points')
                    .eq('id', userId);

                if (error) throw error;

                if (data && data.length > 0) {
                    document.getElementById('points-display').textContent = data[0].loyalty_points !== null ? data[0].loyalty_points : 0;
                } else {
                    document.getElementById('points-display').textContent = "0";
                }
            } catch (err) {
                console.error("Erreur points :", err.message);
                document.getElementById('points-display').textContent = "0";
            }
        }

        // Récupération de la session utilisateur avec affichage immédiat de l'email
        async function checkUserSession() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (!session || !session.user) {
                    window.location.href = "index.html"; 
                    return;
                }

                userId = session.user.id;
                // Force l'affichage immédiat de l'email de l'utilisateur connecté
                document.getElementById('user-email').textContent = `Email : ${session.user.email}`;
                
                await refreshPoints();
            } catch (err) {
                console.error("Erreur session :", err.message);
                window.location.href = "index.html";
            }
        }

        // Échanger Points -> Code
        document.getElementById('btn-convert-to-code').addEventListener('click', async () => {
            const btn = document.getElementById('btn-convert-to-code');
            const pointsToSpend = parseInt(document.getElementById('points-tier-select').value);
            btn.disabled = true;

            try {
                const { data: profiles, error: profileError } = await supabase
                    .from('profiles')
                    .select('loyalty_points')
                    .eq('id', userId);

                if (profileError) throw profileError;
                
                const currentPts = (profiles && profiles[0]) ? (profiles[0].loyalty_points || 0) : 0;

                if (currentPts < pointsToSpend) {
                    alert(`Points insuffisants ! Il vous faut au moins ${pointsToSpend} points.`);
                    btn.disabled = false;
                    return;
                }

                const uniqueCode = "SHADOW-PT-" + Math.random().toString(36).substring(2, 8).toUpperCase();

                const { error: insertError } = await supabase
                    .from('codes_points')
                    .insert([{
                        code: uniqueCode,
                        points_required: pointsToSpend,
                        user_id: userId,
                        used: false
                    }]);

                if (insertError) throw insertError;

                const { error: updateError } = await supabase
                    .from('profiles')
                    .update({ loyalty_points: currentPts - pointsToSpend })
                    .eq('id', userId);

                if (updateError) {
                    await supabase.from('codes_points').delete().eq('code', uniqueCode);
                    throw updateError;
                }

                alert(`Code généré avec succès :\n\n👉 ${uniqueCode}`);
                await refreshPoints();
            } catch (err) {
                alert("Erreur : " + err.message);
            } finally {
                btn.disabled = false;
            }
        });

        // Reconvertir / Fusionner Code
        document.getElementById('btn-reconvert-to-points').addEventListener('click', async () => {
            const btn = document.getElementById('btn-reconvert-to-points');
            const inputCode = document.getElementById('code-to-reconvert').value.trim().toUpperCase();

            if (!inputCode) {
                alert("Veuillez saisir un code.");
                return;
            }

            btn.disabled = true;

            try {
                const { data: pointsCredited, error } = await supabase.rpc('fusion_code_secure', {
                    user_id_param: userId,
                    input_code_param: inputCode
                });

                if (error) throw error;

                alert(`Fusion réussie ! +${pointsCredited} points ajoutés.`);
                document.getElementById('code-to-reconvert').value = "";
                await refreshPoints();
            } catch (err) {
                alert("Erreur de fusion : " + err.message);
            } finally {
                btn.disabled = false;
            }
        });

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }

        // Fermeture automatique du menu au clic extérieur
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('side-menu');
            const btn = document.getElementById('menu-btn');
            if (!menu.contains(event.target) && !btn.contains(event.target) && menu.classList.contains('open')) {
                menu.classList.remove('open');
            }
        });

        window.addEventListener('DOMContentLoaded', checkUserSession);
    </script>
</body>
</html>
