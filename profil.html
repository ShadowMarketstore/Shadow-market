<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Personnel - Shadow Market</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
    <style>
        /* [Ton CSS reste inchangé] */
        :root { --bg-color: #0d0e12; --accent-color: #00f2fe; --crimson-neon: #ff0055; }
        body { background-color: var(--bg-color); color: #ffffff; font-family: sans-serif; }
        .debug-console { border: 1px dashed var(--crimson-neon); padding: 10px; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="debug-console">
        <div id="debug-log">Initialisation...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://jsuvimxjmjiljntmgbzu.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4"; 

        async function initApp() {
            const logBox = document.getElementById('debug-log');
            
            // Vérification de sécurité pour Supabase
            if (typeof supabase === 'undefined' && (!window.supabase)) {
                logBox.innerHTML = "⚠️ En attente de la bibliothèque Supabase...";
                setTimeout(initApp, 500); // Réessaye dans 500ms
                return;
            }

            try {
                const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                logBox.innerHTML = "✅ Supabase chargé. Analyse de la session...";
                
                const { data: { session }, error } = await client.auth.getSession();
                if (error) throw error;
                
                if (session) {
                    logBox.innerHTML = "🚀 Session active : " + session.user.email;
                } else {
                    logBox.innerHTML = "❌ Aucune session détectée.";
                }
            } catch (err) {
                logBox.innerHTML = "💥 Erreur : " + err.message;
            }
        }

        // Lancement retardé pour garantir la fin du chargement
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(initApp, 1000);
        });
    </script>
</body>
</html>
