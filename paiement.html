<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement Crypto - Shadow Market</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .payment-box { background: #111; padding: 40px; border: 1px solid #00ffff; border-radius: 12px; text-align: center; }
        h2 { color: #00ffff; }
        .btn-crypto { background: #00ffff; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="payment-box">
        <h2>Total à payer : <span id="total-val">0.00</span> €</h2>
        <p style="color: #aaa;">Paiement sécurisé par NOWPayments</p>
        <button class="btn-crypto" onclick="payerCrypto()">Payer en Crypto (BTC/USDT)</button>
    </div>

    <script>
        const API_KEY = '70856b4a-2c08-4829-bada-878ba1da0a53';
        const total = localStorage.getItem('totalPanier') || "0.00";
        document.getElementById('total-val').innerText = total;

        async function payerCrypto() {
            const payload = {
                price_amount: parseFloat(total),
                price_currency: "eur",
                pay_currency: "btc",
                order_id: "SHADOW_" + Date.now()
            };

            try {
                const response = await fetch("https://api-sandbox.nowpayments.io/v1/payment", {
                    method: 'POST',
                    headers: { 'x-api-key': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                // Redirection automatique vers la page de paiement officielle
                if (result.invoice_url) {
                    window.location.href = result.invoice_url;
                } else {
                    alert("Erreur lors de la création de la facture.");
                }
            } catch (error) {
                alert("Problème de connexion au serveur.");
            }
        }
    </script>
</body>
</html>
