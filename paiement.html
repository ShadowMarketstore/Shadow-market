<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement - Shadow Market</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; }
        .payment-container { max-width: 400px; margin: auto; background: #111; padding: 25px; border: 1px solid #00ffff; border-radius: 12px; }
        h2 { text-align: center; color: #00ffff; margin-bottom: 20px; }
        .input-field { width: 100%; margin-bottom: 15px; }
        label { display: block; font-size: 0.9em; margin-bottom: 5px; color: #aaa; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .btn-pay { width: 100%; padding: 15px; background: #00ffff; border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        
        /* Section Crypto */
        .crypto-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; text-align: center; }
        .crypto-btn { background: #333; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="payment-container">
        <h2>Paiement Sécurisé</h2>
        <div style="text-align: center; font-size: 1.5em; margin-bottom: 20px; color: #00ffff;" id="total-val">0.00 €</div>
        
        <div class="input-field">
            <label>N° de carte</label>
            <input type="text" placeholder="0000 0000 0000 0000">
        </div>
        
        <div class="row">
            <div class="input-field">
                <label>Expiration</label>
                <input type="text" placeholder="MM/AA">
            </div>
            <div class="input-field">
                <label>CVV</label>
                <input type="text" placeholder="***">
            </div>
        </div>
        <button class="btn-pay" onclick="validerPaiement()">Payer <span id="btn-total">0.00</span> €</button>

        <div class="crypto-section">
            <p style="color: #aaa;">Ou payez en Crypto :</p>
            <button class="crypto-btn" onclick="afficherCrypto()">₿ Bitcoin / USDT</button>
        </div>
    </div>

    <script>
        let total = localStorage.getItem('totalPanier') || "0.00";
        document.getElementById('total-val').innerText = total + " €";
        document.getElementById('btn-total').innerText = total;

        function validerPaiement() {
            alert("Traitement carte bancaire...");
        }

        function afficherCrypto() {
            alert("Veuillez envoyer " + total + " € en BTC ou USDT sur notre adresse wallet. Contactez le support pour obtenir l'adresse.");
        }
    </script>
</body>
</html>
