<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Shadow Market - Paiement</title>
    </head>
<body style="background-color: #050505; color: white;">

    <h1>Votre Panier</h1>
    <div id="recapitulatif">
        </div>

    <h3>Total à payer : <span id="total-prix">0 €</span></h3>

    <button id="btn-payer" style="background-color: #00f2ff; padding: 15px;">
        PAYER 1 € / PAY WITH CRYPTO
    </button>

    <script>
        // C'est ici qu'on mettra la logique pour récupérer les produits
        // et envoyer la demande de paiement à NOWPayments plus tard.
    <script>
    // 1. On récupère le panier depuis la mémoire du navigateur
    let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
    let recapContainer = document.getElementById('recapitulatif');
    let totalElement = document.getElementById('total-prix');
    let total = 0;

    // 2. On affiche chaque produit
    if (panier.length === 0) {
        recapContainer.innerHTML = "<p>Votre panier est vide.</p>";
    } else {
        panier.forEach(item => {
            let itemDiv = document.createElement('div');
            itemDiv.innerHTML = `${item.nom} - ${item.prix} €`;
            recapContainer.appendChild(itemDiv);
            total += parseFloat(item.prix);
        });
        
        // 3. On affiche le total
        totalElement.innerText = total + " €";
    }
</script>

</body>
</html>
