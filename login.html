<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Connexion</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { 
      background: #000; 
      color: #fff; 
      font-family: 'Segoe UI', sans-serif; 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .order-form { 
      width: 100%; 
      max-width: 400px; 
      background: #111; 
      padding: 30px; 
      border: 2px solid #00ffff; 
      border-radius: 20px; 
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      box-sizing: border-box;
    }

    .form-group { margin-bottom: 20px; }
    
    label { display: block; margin-bottom: 5px; color: #00ffff; }
    
    input { 
      background: #000; 
      border: 1px solid #00ffff; 
      color: #fff; 
      padding: 12px; 
      width: 100%; 
      box-sizing: border-box; 
      border-radius: 5px;
      margin-top: 5px;
    }

    .submit-btn { 
      width: 100%; 
      padding: 12px; 
      background: #ff0040; 
      color: white; 
      border: none; 
      border-radius: 5px; 
      font-weight: bold; 
      cursor: pointer; 
      margin-top: 10px;
    }
    
    #eyeIcon { 
      cursor: pointer; 
      color: #00f3ff; 
      user-select: none; 
      position: absolute; 
      right: 15px; 
    }
  </style>
</head>
<body>

<main class="main-content-wrapper" style="width: 100%; display: flex; justify-content: center;">
  <div class="order-form">
    <h2 id="formTitle" style="color: #00f3ff; text-align: center; margin-bottom: 20px;">CONNEXION</h2>
    <form id="authForm" autocomplete="off">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="password" required style="padding-right: 45px;">
          <span id="eyeIcon" onclick="togglePassword()">🙈</span>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">SE CONNECTER</button>
      <p id="toggleText" onclick="toggleMode()" style="cursor: pointer; text-align: center; margin-top: 15px; color: #fff;">Pas de compte ? Créer un compte</p>
    </form>
  </div>
</main>

<script>
  const db = supabase.createClient(
    'https://jsuvimxjmjiljntmgbzu.supabase.co',
    'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
  );

  let isLogin = true;

  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = "profil.html";
  });

  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('formTitle').innerText = isLogin ? "CONNEXION" : "CRÉER UN COMPTE";
    document.getElementById('submitBtn').innerText = isLogin ? "SE CONNECTER" : "S'INSCRIRE";
    document.getElementById('toggleText').innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
  }

  function togglePassword() {
    const p = document.getElementById('password');
    const i = document.getElementById('eyeIcon');
    if (p.type === 'password') {
      p.type = 'text';
      i.innerText = '🙉';
    } else {
      p.type = 'password';
      i.innerText = '🙈';
    }
  }

  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = isLogin
      ? await db.auth.signInWithPassword({ email, password })
      : await db.auth.signUp({ email, password });

    if (error) {
      alert("Erreur : " + error.message);
      submitBtn.disabled = false;
      return;
    }

    if (data?.session) {
      window.location.href = "profil.html";
    } else if (!isLogin) {
      alert("Compte créé. Vérifie ta boîte mail pour confirmer.");
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
