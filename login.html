<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Style pour le toggle et l'œil */
    .auth-toggle { text-align: center; color: #00f3ff; margin-bottom: 20px; cursor: pointer; }
    .password-container { position: relative; }
    .toggle-eye { position: absolute; right: 10px; top: 40px; cursor: pointer; color: #dc143c; }
  </style>
</head>
<body>

<main class="main-content-wrapper">
  <h2 id="form-title" style="color: #00f3ff; margin-top: 20px;">CONNEXION</h2>
  
  <form id="authForm" class="order-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    
    <div class="form-group password-container">
      <label>Mot de passe</label>
      <input type="password" id="password" required>
      <span class="toggle-eye" onclick="togglePass()">👁️</span>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">SE CONNECTER</button>
    
    <p class="auth-toggle" onclick="toggleMode()" id="toggle-text">Pas de compte ? Créer un compte</p>
  </form>
</main>

<nav class="floating-nav">
    <a href="login.html" class="nav-link active">👤</a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
</nav>

<script>
  // Basculer entre Login et Signup
  let isLogin = true;
  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('form-title').innerText = isLogin ? "CONNEXION" : "CRÉER UN COMPTE";
    document.getElementById('submit-btn').innerText = isLogin ? "SE CONNECTER" : "S'INSCRIRE";
    document.getElementById('toggle-text').innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
  }

  // Basculer la visibilité du mot de passe
  function togglePass() {
    const passInput = document.getElementById('password');
    passInput.type = (passInput.type === 'password') ? 'text' : 'password';
  }
</script>
</body>
</html>
