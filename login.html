<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Auth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="main-content-wrapper" style="padding-top: 50px;">
  <div class="order-form">
    <h2 id="formTitle" style="color: #00f3ff; text-align: center; margin-bottom: 20px;">CONNEXION</h2>
    
    <form id="authForm" autocomplete="off">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      
      <div class="form-group">
        <label>Mot de passe</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="password" required style="padding-right: 40px; width: 100%;">
          <!-- Thème singe appliqué ici -->
          <span id="eyeIcon" onclick="togglePassword()" style="position: absolute; right: 10px; cursor: pointer; color: #00f3ff; user-select: none;">🐵</span>
        </div>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">SE CONNECTER</button>
      
      <p id="toggleText" class="auth-toggle" onclick="toggleMode()" style="cursor: pointer; text-align: center; margin-top: 15px; color: #fff;">
        Pas de compte ? Créer un compte
      </p>
    </form>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabase = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');
  let isLogin = true;

  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('formTitle').innerText = isLogin ? "CONNEXION" : "CRÉER UN COMPTE";
    document.getElementById('submitBtn').innerText = isLogin ? "SE CONNECTER" : "S'INSCRIRE";
    document.getElementById('toggleText').innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
  }

  function togglePassword() {
    const passInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    // Changement d'icône pour rester dans le thème singe
    if (passInput.type === 'password') {
      passInput.type = 'text';
      eyeIcon.innerText = '🙉'; 
    } else {
      passInput.type = 'password';
      eyeIcon.innerText = '🙈'; 
    }
  }

  document.getElementById('authForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    let response;
    if (isLogin) {
      response = await supabase.auth.signInWithPassword({ email, password });
    } else {
      response = await supabase.auth.signUp({ email, password });
    }

    if (response.error) {
      alert("Erreur : " + response.error.message);
    } else {
      localStorage.setItem('userEmail', email);
      window.location.href = "profil.html";
    }
  });
</script>

</body>
</html>
