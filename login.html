<script>
  let isLogin = true;
  let compteEnregistre = { email: "test@test.com", password: "123" };

  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('form-title').innerText = isLogin ? "CONNEXION" : "CRÉER UN COMPTE";
    document.getElementById('submit-btn').innerText = isLogin ? "SE CONNECTER" : "S'INSCRIRE";
    document.getElementById('toggle-text').innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
  }

  function togglePass() {
    const p = document.getElementById('password');
    p.type = (p.type === 'password') ? 'text' : 'password';
  }

  document.getElementById('authForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const emailInput = document.getElementById('email').value;
    const passInput = document.getElementById('password').value;
    const btn = document.getElementById('submit-btn');

    if (isLogin) {
      if (emailInput === compteEnregistre.email && passInput === compteEnregistre.password) {
        alert("Connexion réussie !");
        window.location.href = 'index.html';
      } else {
        btn.style.background = "#dc143c";
        btn.innerText = "MOT DE PASSE INCORRECT";
        setTimeout(() => { btn.innerText = "SE CONNECTER"; btn.style.background = ""; }, 2000);
      }
    } else {
      compteEnregistre.email = emailInput;
      compteEnregistre.password = passInput;
      alert("Compte créé !");
      toggleMode();
    }
  });
</script>
