<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Auth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="main-content-wrapper" style="padding-top: 50px;">
  <div class="order-form">
    <h2 id="formTitle" style="color: #00f3ff; text-align: center; margin-bottom: 20px;">CONNEXION</h2>
    
    <form id="authForm" autocomplete="off">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="new-password">
      </div>
      
      <div class="form-group">
        <label>Mot de passe</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="password" required style="padding-right: 40px; width: 100%;" autocomplete="new-password">
          <span id="eyeIcon" onclick="togglePassword()" style="position: absolute; right: 10px; cursor: pointer; color: #00f3ff; user-select: none;">🐵</span>
        </div>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">SE CONNECTER</button>
      
      <p id="toggleText" class="auth-toggle" onclick="toggleMode()" style="cursor: pointer; text-align: center; margin-top: 15px; color: #fff;">
        Pas de compte ? Créer un compte
      </p>
    </form>
  </div>
</main>

<nav class="floating-nav">
  <a href="login.html" class="nav-link active">👤</a>
  <a href="commande.html" class="nav-link">🛒</a>
  <a href="index.html" class="nav-link">🏠</a>
  <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
</nav>

<script>
  // 1. Vérification automatique au chargement de la page
  if (localStorage.getItem('isLoggedIn') === 'true') {
    window.location.href = "profil.html";
  }

  let isLogin = true;

  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('formTitle').innerText = isLogin ? "CONNEXION" : "CRÉER UN COMPTE";
    document.getElementById('submitBtn').innerText = isLogin ? "SE CONNECTER" : "S'INSCRIRE";
    document.getElementById('toggleText').innerText = isLogin ? "Pas de compte ? Créer un compte" : "Déjà un compte ? Connexion";
  }

  function togglePassword() {
    const passInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    
    if (passInput.type === 'password') {
      passInput.type = 'text';
      eyeIcon.innerText = '🙉'; // Thème singe
    } else {
      passInput.type = 'password';
      eyeIcon.innerText = '🙈'; // Thème singe
    }
  }

  document.getElementById('authForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // Simulation de connexion
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userEmail', document.getElementById('email').value);
    
    // Redirection après connexion
    window.location.href = "profil.html"; 
  });
</script>

</body>
</html>
