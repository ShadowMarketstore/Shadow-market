<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Shadow Market - Accès</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* CSS spécifique pour le switch Login/Signup */
    .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .tab { color: #888; cursor: pointer; font-weight: bold; }
    .tab.active { color: #00f3ff; border-bottom: 2px solid #00f3ff; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <main class="main-content-wrapper">
    <div class="order-form" style="max-width: 400px; margin-top: 50px;">
      
      <div class="tabs">
        <div class="tab" onclick="showForm('login')">Login</div>
        <div class="tab active" onclick="showForm('signup')">Signup</div>
      </div>

      <h2 id="form-title" style="color: #00f3ff; text-align: center; margin: 20px 0;">Signup</h2>

      <form id="authForm">
        <div class="form-group">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" placeholder="Password" required>
        </div>
        <div id="signup-fields">
          <div class="form-group">
            <input type="password" placeholder="Confirm Password" required>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Signup</button>
      </form>
    </div>
  </main>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link active">👤</a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <script>
    function showForm(type) {
      const title = document.getElementById('form-title');
      const btn = document.getElementById('submit-btn');
      const signupFields = document.getElementById('signup-fields');
      
      if(type === 'login') {
        title.innerText = 'Login';
        btn.innerText = 'Login';
        signupFields.classList.add('hidden');
      } else {
        title.innerText = 'Signup';
        btn.innerText = 'Signup';
        signupFields.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
