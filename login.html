<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Accès</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

  <form id="loginForm" class="order-form" style="width: 100%; max-width: 350px;">
    <h2 class="section-title" style="margin-bottom: 20px;">Connexion</h2>
    
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" required>
    </div>
    
    <button type="submit" class="submit-btn">Accéder</button>
  </form>

</body>
</html>
