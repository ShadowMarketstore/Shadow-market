<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Shadow Market</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh;">

  <div class="order-form" style="width: 350px;">
    <h2 style="color: #00f3ff; text-align: center; margin-bottom: 20px;">CONNEXION</h2>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required style="width: 100%; padding: 10px; background: #000; border: 1px solid #dc143c; color: #fff; border-radius: 8px;">
      </div>
      
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" required style="width: 100%; padding: 10px; background: #000; border: 1px solid #dc143c; color: #fff; border-radius: 8px;">
      </div>
      
      <button type="submit" class="buy-btn" style="margin-top: 15px;">SE CONNECTER</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault(); 
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const motDePasse = 'Steven2008@'; 

      if ((email === 'Support.shadowmarket@gmail.com' || email === 'Ahonsteven4@gmail.com') && password === motDePasse) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'account.html';
      }
    });
  </script>
</body>
</html>
