<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <style>
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; padding-bottom: 100px; }
    
    #dynamic-header { width: 100%; margin-bottom: 20px; }
    #main-logo { width: 100%; height: auto; display: block; object-fit: contain; }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 10px; }
    .product-card { 
        position: relative; border: 2px solid #00ffff; border-radius: 15px; 
        padding: 10px; background: #111; display: flex; flex-direction: column; 
        justify-content: space-between; min-height: 350px;
    }

    .product-img { width: 100%; height: 160px; background-size: contain; background-position: center; background-repeat: no-repeat; border-radius: 8px; background-color: #000; }

    h3 { font-size: 0.95em; margin: 5px 0; min-height: 2.4em; }
    .price-wrapper { margin: 5px 0; }
    .old-price { text-decoration: line-through; color: #777; font-size: 0.85em; display: block; }
    .current-price { color: #fff; font-weight: bold; font-size: 1.2em; display: block; }
    
    .out-of-stock-text { color: #ff0000; font-weight: bold; margin: 10px 0; display: block; }
    
    .buy-btn { width: 100%; background: #ff0033; color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
    .buy-btn:disabled { background: #333; color: #777; cursor: not-allowed; }

    .discount-badge { position: absolute; top: 15px; left: 15px; background: #000; color: #00ffff; border: 1px solid #00ffff; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 0.8em; z-index: 20; }
    .ribbon-badge { position: absolute; top: 14px; right: -32px; background: #00ffff; color: #000; font-size: 0.7em; font-weight: bold; padding: 4px 32px; transform: rotate(45deg); z-index: 10; }

    .floating-nav { position: fixed; bottom: 20px; left: 10%; right: 10%; background: #111; padding: 15px; border-radius: 30px; border: 1px solid #00ffff; display: flex; justify-content: space-around; z-index: 1000; }
    .nav-link { text-decoration: none; color: white; }
    #cart-count { background: #00ffff; color: #000; border-radius: 50%; padding: 2px 6px; font-size: 0.7em; }
  </style>
</head>
<body>

  <header id="dynamic-header">
    <a href="index.html" id="logo-link">
      <img id="main-logo" src="" alt="Shadow Market Logo">
    </a>
  </header>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" id="cart-link" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link active">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <main>
    <div class="products-grid" id="products-container"><p style="text-align: center;">Chargement...</p></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

    // Chargement robuste du logo
    function loadLogo() {
      const logoImg = document.getElementById('main-logo');
      const timestamp = new Date().getTime();
      logoImg.src = `https://jsuvimxjmjiljntmgbzu.supabase.co/storage/v1/object/public/logos/site-logo.png?t=${timestamp}`;
      logoImg.onerror = () => { logoImg.style.display = 'none'; };
    }

    function updateCartCounter() {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      document.getElementById('cart-count').innerText = panier.length;
    }

    async function loadProducts() {
      const container = document.getElementById('products-container');
      loadLogo();
      updateCartCounter();

      try {
        const { data: products, error } = await supabaseClient.from('products').select('*');
        if (error) throw error;
        
        container.innerHTML = '';
        if (!products || products.length === 0) {
            container.innerHTML = '<p style="text-align: center;">Aucun produit disponible.</p>';
            return;
        }

        products.forEach(p => {
            const isOutOfStock = p.stock <= 0;
            let discountHtml = (p.old_price > p.price) ? `<div class="discount-badge">-${Math.round(((p.old_price - p.price) / p.old_price) * 100)}%</div>` : '';
            
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
              ${discountHtml}
              ${(p.is_new) ? `<div class="ribbon-badge">NEW</div>` : ''}
              <div class="product-img" style="background-image: url('${p.image_url}')"></div>
              <h3>${p.name}</h3>
              ${isOutOfStock 
                ? `<span class="out-of-stock-text">RUPTURE DE STOCK</span>` 
                : `<div class="price-wrapper"><span class="old-price">${p.old_price} EUR</span><span class="current-price">${p.price} EUR</span></div>`
              }
              <button class="buy-btn" ${isOutOfStock ? 'disabled' : ''}>${isOutOfStock ? 'ÉPUISÉ' : 'AJOUTER AU PANIER'}</button>
            `;
            container.appendChild(card);
        });
      } catch (err) {
        container.innerHTML = `<p style="text-align: center; color: red;">Erreur de chargement : ${err.message}</p>`;
      }
    }

    window.onload = loadProducts;
  </script>
</body>
</html>
