<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <style>
    /* Design Global */
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; }
    
    /* Zone Logo Prédéfinie */
    #dynamic-header { width: 100%; padding: 20px 0; display: flex; justify-content: center; background: #0a0a0a; border-bottom: 1px solid #00ffff; }
    #main-logo { max-width: 80%; max-height: 150px; object-fit: contain; }

    /* Grille et Cartes */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 10px; }
    .product-card { 
        position: relative; border: 2px solid #00ffff; border-radius: 15px; 
        padding: 10px; background: #111; display: flex; flex-direction: column; 
        justify-content: space-between; min-height: 350px;
    }

    .product-img { width: 100%; height: 160px; background-size: contain; background-position: center; background-repeat: no-repeat; border-radius: 8px; background-color: #000; }
    h3 { font-size: 0.95em; margin: 5px 0; min-height: 2.4em; }
    .price-wrapper { margin: 5px 0; }
    .old-price { text-decoration: line-through; color: #777; font-size: 0.85em; display: block; }
    .current-price { color: #fff; font-weight: bold; font-size: 1.2em; display: block; }
    .out-of-stock-text { color: #ff0000; font-weight: bold; margin: 10px 0; display: block; }
    .buy-btn { width: 100%; background: #ff0033; color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
    .buy-btn:disabled { background: #333; color: #777; cursor: not-allowed; }

    /* Navigation */
    .floating-nav { position: fixed; bottom: 20px; left: 10%; right: 10%; background: #111; padding: 15px; border-radius: 30px; border: 1px solid #00ffff; display: flex; justify-content: space-around; z-index: 100; }
    .nav-link { text-decoration: none; color: white; }
    #cart-count { background: #00ffff; color: #000; border-radius: 50%; padding: 2px 6px; font-size: 0.7em; }
  </style>
</head>
<body>

  <header id="dynamic-header">
    <img id="main-logo" src="" alt="Shadow Market Logo" onerror="this.style.display='none'">
  </header>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" id="cart-link" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link active">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <main>
    <div class="products-grid" id="products-container"><p style="text-align: center;">Chargement des produits...</p></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Configuration
    const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Fonction pour charger le logo dynamiquement depuis le bucket
    function loadLogo() {
      const logoImg = document.getElementById('main-logo');
      const timestamp = new Date().getTime(); // Force le rafraîchissement
      logoImg.src = `${SUPABASE_URL}/storage/v1/object/public/logos/site-logo.png?t=${timestamp}`;
    }

    function updateCartCounter() {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      document.getElementById('cart-count').innerText = panier.length;
    }

    async function loadProducts() {
      loadLogo(); // On charge le logo au démarrage
      updateCartCounter();

      const container = document.getElementById('products-container');
      const { data: products } = await supabase.from('products').select('*');
      
      container.innerHTML = '';
      if (products) {
          products.forEach(p => {
            const isOutOfStock = p.stock <= 0;
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
              <div class="product-img" style="background-image: url('${p.image_url}')"></div>
              <h3>${p.name}</h3>
              ${isOutOfStock ? `<span class="out-of-stock-text">RUPTURE</span>` : `<div class="price-wrapper"><span class="current-price">${p.price} EUR</span></div>`}
              <button class="buy-btn" ${isOutOfStock ? 'disabled' : ''}>${isOutOfStock ? 'ÉPUISÉ' : 'AJOUTER'}</button>
            `;
            container.appendChild(card);
          });
      }
    }
    
    window.onload = loadProducts;
  </script>
</body>
</html>
