<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styles spécifiques pour corriger les images et le compteur */
    .product-img {
        width: 100%;
        height: 180px;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px;
    }
    #cart-link { position: relative; text-decoration: none; color: white; }
    #cart-count { 
        position: absolute; top: -5px; right: -5px; background: #00ffff; color: #000; 
        border-radius: 50%; padding: 2px 5px; font-size: 0.6em; font-weight: bold; 
    }
    .product-card { position: relative; overflow: hidden; }
    .ribbon-badge { position: absolute; top: 14px; right: -32px; background: #00ffff; color: #000; font-size: 0.72em; font-weight: bold; padding: 4px 32px; transform: rotate(45deg); box-shadow: 0 0 8px #00ffff; text-transform: uppercase; letter-spacing: 1px; z-index: 10; }
    .debug-error { color: #ff0000; background: #222; padding: 15px; border: 1px solid #ff0000; border-radius: 5px; margin: 20px; font-family: monospace; }
  </style>
</head>
<body>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" id="cart-link" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link active">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <div class="main-content-wrapper">
    <header>
      <div class="logo-wrapper"><img src="logo.png" alt="Shadow Market Logo"></div>
    </header>

    <main>
      <h1 class="section-title">Produits Disponibles</h1>
      <div class="products-grid" id="products-container"><p style="color: #00ffff; text-align: center;">Chargement...</p></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

    function updateCartCounter() {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      document.getElementById('cart-count').innerText = panier.length;
    }

    // Ajout direct sans alerte de confirmation
    function ajouterAuPanier(nom, prix, desc, image) {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      panier.push({ nom, prix, desc, image });
      localStorage.setItem('monPanier', JSON.stringify(panier));
      updateCartCounter();
    }

    async function loadProducts() {
      const container = document.getElementById('products-container');
      try {
        const { data: products, error } = await supabaseClient.from('products').select('*');
        if (error) throw new Error(error.message);
        
        container.innerHTML = '';
        products.forEach(p => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            ${(p.ribbon && p.ribbon !== 'none') ? `<div class="ribbon-badge">${p.ribbon.toUpperCase()}</div>` : ''}
            <div class="product-img" style="background-image: url('${p.image_url}')"></div>
            <h3>${p.name}</h3>
            <p>${p.price} EUR</p>
            <button class="buy-btn" onclick="ajouterAuPanier('${p.name}', ${p.price}, '${p.description}', '${p.image_url}')">AJOUTER AU PANIER</button>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        container.innerHTML = `<div class="debug-error">${err.message}</div>`;
      }
      updateCartCounter();
    }
    window.onload = loadProducts;
  </script>
</body>
</html>
