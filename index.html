<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <style>
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; padding-bottom: 120px; }
    
    /* Conteneur du logo avec bordure néon cyan */
    #header-wrapper { 
        width: 90%; 
        margin: 20px auto; 
        border: 3px solid #00ffff; 
        border-radius: 15px; 
        padding: 5px; 
        box-shadow: 0 0 15px #00ffff, inset 0 0 10px #00ffff; 
        display: flex; 
        justify-content: center; 
        background: #0a0a0a;
    }

    #main-logo { width: 100%; max-height: 400px; object-fit: contain; display: block; }

    /* Titre agrandi */
    .section-title { 
        text-align: center; 
        color: #00ffff; 
        font-size: 1.6em; 
        margin: 20px 0; 
        text-transform: uppercase; 
        font-weight: bold; 
        text-shadow: 0 0 10px #00ffff;
    }

    /* Grille produits (inchangée) */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 10px; }
    .product-card { position: relative; border: 2px solid #00ffff; border-radius: 15px; padding: 10px; background: #111; display: flex; flex-direction: column; min-height: 400px; }
    .product-img { width: 100%; height: 160px; background-size: contain; background-position: center; background-repeat: no-repeat; border-radius: 8px; border: 1.5px solid #DC143C; box-shadow: 0 0 5px rgba(220, 20, 60, 0.5); background-color: #000; }
    .discount-badge { position: absolute; top: 15px; left: 15px; background: #000; color: #ffffff; border: 1px solid #00ffff; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 0.8em; z-index: 20; }
    
    .stock-info { font-size: 0.85em; color: #00ffff; margin: 8px 0; font-weight: bold; }
    h3 { font-size: 0.95em; margin: 10px 0; min-height: 2.4em; }
    .price-wrapper { margin: 5px 0; }
    .old-price { text-decoration: line-through; color: #777; font-size: 0.85em; display: block; }
    .current-price { color: #ffffff; font-weight: bold; font-size: 1.3em; display: block; }
    
    .buy-btn { width: 100%; background: #DC143C; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
    .buy-btn:disabled { background: #333; color: #777; cursor: not-allowed; }

    /* Navigation */
    .floating-nav { position: fixed; bottom: 20px; left: 5%; right: 5%; background: #111; padding: 15px 25px; border-radius: 40px; border: 1px solid #00ffff; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
    .nav-link { text-decoration: none; color: white; font-size: 24px; }
    #cart-count { background: #00ffff; color: #000; border-radius: 50%; padding: 2px 8px; font-size: 0.7em; font-weight: bold; }
  </style>
</head>
<body>

  <div id="header-wrapper">
    <img id="main-logo" src="" alt="Shadow Market">
  </div>

  <h2 class="section-title">Produits disponibles maintenant</h2>

  <main>
    <div class="products-grid" id="products-container"><p style="text-align: center;">Chargement...</p></div>
  </main>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

    async function loadData() {
      document.getElementById('main-logo').src = 'https://jsuvimxjmjiljntmgbzu.supabase.co/storage/v1/object/public/logos/site-logo.png?t=' + new Date().getTime();

      const container = document.getElementById('products-container');
      const { data: products } = await supabaseClient.from('products').select('*');
      
      container.innerHTML = '';
      if (products) {
        products.forEach(p => {
          const stockVal = p.stock_quantity !== undefined ? p.stock_quantity : 0;
          const isOutOfStock = stockVal <= 0;
          const discount = p.old_price > p.price ? Math.round(((p.old_price - p.price) / p.old_price) * 100) : 0;
          
          const card = document.createElement('div');
          card.className = 'product-card';
          const productParam = encodeURIComponent(JSON.stringify(p));
          
          card.innerHTML = `
            ${discount > 0 ? `<div class="discount-badge">-${discount}%</div>` : ''}
            <div class="product-img" style="background-image: url('${p.image_url}')"></div>
            <h3>${p.name}</h3>
            <div class="stock-info">Stock : ${isOutOfStock ? 'Épuisé' : stockVal}</div>
            <div class="price-wrapper">
                ${p.old_price > p.price ? `<span class="old-price">${p.old_price} EUR</span>` : ''}
                <span class="current-price">${p.price} EUR</span>
            </div>
            <button class="buy-btn" ${isOutOfStock ? 'disabled' : ''} onclick="handlePurchase('${productParam}', ${stockVal})">
                ${isOutOfStock ? 'ÉPUISÉ' : 'AJOUTER AU PANIER'}
            </button>
          `;
          container.appendChild(card);
        });
      }
      updateCartCount();
    }

    async function handlePurchase(encodedProduct, currentStock) {
      if (currentStock > 0) {
        const product = JSON.parse(decodeURIComponent(encodedProduct));
        await supabaseClient.from('products').update({ stock_quantity: currentStock - 1 }).eq('id', product.id);
        let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
        panier.push(product);
        localStorage.setItem('monPanier', JSON.stringify(panier));
        updateCartCount();
        loadData();
      }
    }

    function updateCartCount() {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      document.getElementById('cart-count').innerText = panier.length;
    }

    window.onload = loadData;
  </script>
</body>
</html>
