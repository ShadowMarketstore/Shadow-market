<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <style>
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; padding-bottom: 100px; }
    
    /* Zone Logo Fixe */
    #dynamic-header { width: 100%; padding: 20px 0; display: flex; justify-content: center; background: #0a0a0a; border-bottom: 1px solid #00ffff; margin-bottom: 20px; }
    #main-logo { max-width: 80%; max-height: 120px; object-fit: contain; }

    /* Grille Produits */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 10px; }
    .product-card { position: relative; border: 2px solid #00ffff; border-radius: 15px; padding: 10px; background: #111; display: flex; flex-direction: column; min-height: 350px; }
    .product-img { width: 100%; height: 160px; background-size: contain; background-position: center; background-repeat: no-repeat; border-radius: 8px; background-color: #000; }

    /* Menu Flottant (Corrigé à la taille standard) */
    .floating-nav { 
        position: fixed; bottom: 20px; left: 5%; right: 5%; 
        background: #111; padding: 15px 25px; 
        border-radius: 40px; border: 1px solid #00ffff; 
        display: flex; justify-content: space-between; align-items: center; 
        z-index: 1000; box-shadow: 0 4px 15px rgba(0, 255, 255, 0.2);
    }
    .nav-link { text-decoration: none; color: white; font-size: 24px; padding: 5px; }
    #cart-count { background: #00ffff; color: #000; border-radius: 50%; padding: 2px 8px; font-size: 0.7em; font-weight: bold; }
  </style>
</head>
<body>

  <header id="dynamic-header">
    <img id="main-logo" src="logo.png" alt="Shadow Market Logo">
  </header>

  <main>
    <div class="products-grid" id="products-container"><p style="text-align: center;">Chargement...</p></div>
  </main>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link active">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

    async function loadData() {
      // Charger Produits
      const container = document.getElementById('products-container');
      const { data: products } = await supabaseClient.from('products').select('*');
      
      container.innerHTML = '';
      if (products) {
        products.forEach(p => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `<div class="product-img" style="background-image: url('${p.image_url}')"></div><h3>${p.name}</h3><p>${p.price} EUR</p>`;
          container.appendChild(card);
        });
      }
      
      // Mise à jour panier
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      document.getElementById('cart-count').innerText = panier.length;
    }
    window.onload = loadData;
  </script>
</body>
</html>
