<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <style>
    /* Design Global */
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; padding-bottom: 100px; }
    
    /* Header & Logo */
    #dynamic-header { width: 100%; padding: 20px 0; display: flex; justify-content: center; background: #0a0a0a; border-bottom: 1px solid #00ffff; }
    #main-logo { max-width: 80%; max-height: 120px; object-fit: contain; }

    /* Grille et Cartes */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
    .product-card { position: relative; border: 2px solid #00ffff; border-radius: 15px; padding: 10px; background: #111; display: flex; flex-direction: column; min-height: 300px; }
    .product-img { width: 100%; height: 150px; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 10px; background-color: #000; }
    h3 { font-size: 0.95em; margin: 5px 0; }
    
    /* Navigation flottante corrigée */
    .floating-nav { position: fixed; bottom: 15px; left: 5%; right: 5%; background: #111; padding: 15px 20px; border-radius: 40px; border: 1px solid #00ffff; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 0 10px #00ffff55; }
    .nav-link { text-decoration: none; color: white; font-size: 22px; padding: 10px; }
    #cart-count { background: #00ffff; color: #000; border-radius: 50%; padding: 2px 8px; font-size: 0.7em; font-weight: bold; }
  </style>
</head>
<body>

  <header id="dynamic-header">
    <img id="main-logo" src="" alt="Shadow Market" onerror="this.style.display='none'">
  </header>

  <main>
    <div class="products-grid" id="products-container"><p style="text-align: center;">Chargement...</p></div>
  </main>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const container = document.getElementById('products-container');
    const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function initPage() {
        try {
            // 1. Chargement du logo
            const logoImg = document.getElementById('main-logo');
            logoImg.src = `${SUPABASE_URL}/storage/v1/object/public/logos/site-logo.png?t=${new Date().getTime()}`;

            // 2. Chargement des produits
            const { data: products, error } = await supabaseClient.from('products').select('*');
            
            if (error) throw error; 

            container.innerHTML = '';
            if (!products || products.length === 0) {
                container.innerHTML = '<p style="text-align:center;">Aucun produit disponible.</p>';
            } else {
                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-img" style="background-image: url('${p.image_url}')"></div>
                        <h3>${p.name}</h3>
                        <p>${p.price} EUR</p>
                    `;
                    container.appendChild(card);
                });
            }
        } catch (err) {
            console.error("Erreur détectée :", err);
            container.innerHTML = `<p style="color:red; text-align:center; padding: 20px;">Erreur lors du chargement : ${err.message}</p>`;
        }
    }

    window.onload = initPage;
  </script>
</body>
</html>
