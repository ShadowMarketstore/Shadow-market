<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Structure et police conservées pour une lisibilité maximale */
    .product-img { width: 100%; height: 180px; background-size: cover; background-position: center; background-repeat: no-repeat; border-radius: 8px; }
    
    .product-card { 
        position: relative; overflow: hidden; padding: 15px; border: 2px solid #00ffff; 
        border-radius: 15px; margin-bottom: 20px; background: #111;
    }

    /* Badge de réduction dynamique */
    .discount-badge { 
        position: absolute; top: 15px; left: 15px; background: #000; color: #00ffff; 
        border: 1px solid #00ffff; padding: 4px 8px; border-radius: 5px; font-weight: bold; 
        z-index: 20; box-shadow: 0 0 5px #00ffff; font-size: 0.8em;
    }

    /* Badge "NEW" */
    .ribbon-badge { 
        position: absolute; top: 14px; right: -32px; background: #00ffff; color: #000; 
        font-size: 0.72em; font-weight: bold; padding: 4px 32px; transform: rotate(45deg); 
        box-shadow: 0 0 8px #00ffff; text-transform: uppercase; z-index: 10; 
    }

    /* Gestion des prix propre */
    .price-wrapper { margin: 10px 0; }
    .old-price { text-decoration: line-through; color: #777; font-size: 0.9em; display: block; }
    .current-price { color: #fff; font-weight: bold; font-size: 1.2em; display: block; margin-top: 2px; }

    .buy-btn { width: 100%; background: #ff0033; color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" id="cart-link" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link active">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <div class="main-content-wrapper">
    <header>
      <div class="logo-wrapper"><img src="logo.png" alt="Shadow Market Logo"></div>
    </header>

    <main>
      <h1 class="section-title">Produits Disponibles</h1>
      <div class="products-grid" id="products-container"><p style="color: #00ffff; text-align: center;">Chargement...</p></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

    function updateCartCounter() {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      document.getElementById('cart-count').innerText = panier.length;
    }

    async function loadProducts() {
      const container = document.getElementById('products-container');
      try {
        const { data: products, error } = await supabaseClient.from('products').select('*');
        if (error) throw new Error(error.message);
        
        container.innerHTML = '';
        products.forEach(p => {
          // Logique calcul réduction
          let discountHtml = '';
          if (p.old_price && p.price && p.old_price > p.price) {
            const reduction = Math.round(((p.old_price - p.price) / p.old_price) * 100);
            discountHtml = `<div class="discount-badge">-${reduction}%</div>`;
          }

          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            ${discountHtml}
            ${(p.is_new) ? `<div class="ribbon-badge">NEW</div>` : ''}
            <div class="product-img" style="background-image: url('${p.image_url}')"></div>
            <h3>${p.name}</h3>
            <div class="price-wrapper">
              ${p.old_price ? `<span class="old-price">${p.old_price} EUR</span>` : ''}
              <span class="current-price">${p.price} EUR</span>
            </div>
            <button class="buy-btn" onclick="ajouterAuPanier('${p.name}', ${p.price}, '${p.description}', '${p.image_url}')">AJOUTER AU PANIER</button>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        container.innerHTML = `<p style="color:red">Erreur chargement</p>`;
      }
      updateCartCounter();
    }
    window.onload = loadProducts;
  </script>
</body>
</html>
