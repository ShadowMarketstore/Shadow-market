<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <style>
    body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 120px; }
    #dynamic-header { width: 100%; padding: 60px 0; display: flex; justify-content: center; background: #0a0a0a; border-bottom: 2px solid #00ffff; margin-bottom: 25px; }
    #main-logo { width: 85%; max-height: 450px; object-fit: contain; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 10px; }
    .product-card { border: 2px solid #00ffff; border-radius: 15px; padding: 10px; background: #111; display: flex; flex-direction: column; min-height: 400px; }
    .product-img { width: 100%; height: 160px; background-size: contain; background-position: center; background-repeat: no-repeat; border-radius: 8px; border: 1.5px solid #DC143C; margin-bottom: 10px; }
    .stock-info { color: #00ffff; font-weight: bold; margin: 8px 0; }
    .current-price { color: #ffffff; font-weight: bold; font-size: 1.3em; margin: 10px 0; display: block; }
    .buy-btn { width: 100%; background: #DC143C; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
    .buy-btn:disabled { background: #333; color: #777; cursor: not-allowed; }
    .floating-nav { position: fixed; bottom: 20px; left: 5%; right: 5%; background: #111; padding: 15px 25px; border-radius: 40px; border: 1px solid #00ffff; display: flex; justify-content: space-between; z-index: 1000; }
    .nav-link { text-decoration: none; color: white; font-size: 24px; }
    #cart-count { background: #00ffff; color: #000; border-radius: 50%; padding: 2px 8px; font-size: 0.7em; font-weight: bold; }
  </style>
</head>
<body>

  <header id="dynamic-header">
    <img id="main-logo" src="https://jsuvimxjmjiljntmgbzu.supabase.co/storage/v1/object/public/logos/site-logo.png" alt="Shadow Market">
  </header>

  <main>
    <div class="products-grid" id="products-container"><p style="text-align: center;">Chargement...</p></div>
  </main>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

    async function loadData() {
      const container = document.getElementById('products-container');
      const { data: products } = await supabaseClient.from('products').select('*');
      
      container.innerHTML = '';
      if (products) {
        products.forEach(p => {
          // Correction cruciale : utilisation de stock_quantity
          const stockVal = p.stock_quantity ?? 0;
          const isOutOfStock = stockVal <= 0;
          
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            <div class="product-img" style="background-image: url('${p.image_url}')"></div>
            <h3>${p.name}</h3>
            <div class="stock-info">Stock : ${isOutOfStock ? 'Épuisé' : stockVal}</div>
            <span class="current-price">${p.price} EUR</span>
            <button class="buy-btn" ${isOutOfStock ? 'disabled' : ''} onclick="handlePurchase(${p.id}, ${stockVal})">
                ${isOutOfStock ? 'ÉPUISÉ' : 'AJOUTER AU PANIER'}
            </button>
          `;
          container.appendChild(card);
        });
      }
      updateCartCount();
    }

    async function handlePurchase(productId, currentStock) {
      if (currentStock > 0) {
        // 1. Mise à jour dans Supabase (Cible bien stock_quantity)
        const { error } = await supabaseClient
          .from('products')
          .update({ stock_quantity: currentStock - 1 })
          .eq('id', productId);

        if (!error) {
          // 2. Ajout au LocalStorage
          let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
          // Note: Dans une vraie appli, tu devrais récupérer l'objet produit complet ici
          panier.push({id: productId, added: true}); 
          localStorage.setItem('monPanier', JSON.stringify(panier));
          
          // 3. Rafraîchissement immédiat
          loadData();
        } else {
          alert("Erreur de connexion serveur.");
        }
      }
    }

    function updateCartCount() {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      document.getElementById('cart-count').innerText = panier.length;
    }

    window.onload = loadData;
  </script>
</body>
</html>
