<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Positionnement du ruban en diagonale dans le coin supérieur droit de la carte */
    .product-card {
      position: relative; /* Indispensable pour caler le ruban par rapport à la carte */
      overflow: hidden;   /* Coupe tout ce qui dépasse des bordures de la carte */
    }

    .ribbon-badge {
      position: absolute;
      top: 14px;
      right: -32px;
      background: #00ffff;
      color: #000;
      font-size: 0.72em;
      font-weight: bold;
      padding: 4px 32px;
      transform: rotate(45deg); /* Incline le ruban en diagonale */
      box-shadow: 0 0 8px #00ffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 10;
    }

    /* Styles des blocs pour les prix et états des stocks */
    .price-wrapper {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 10px;
    }
    .old-price-style {
      color: #666;
      text-decoration: line-through;
      font-size: 0.85em;
    }
    .stock-status {
      font-size: 0.8em;
      color: #888;
      margin-bottom: 8px;
    }
    .out-of-stock {
      color: #ff3333 !important;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link active">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <div class="main-content-wrapper">
    <header>
      <div class="logo-wrapper">
        <img src="logo.png" alt="Shadow Market Logo">
      </div>
    </header>

    <main>
      <h1 class="section-title">Produits Disponibles</h1>
      
      <div class="products-grid" id="products-container">
        <p style="color: #00ffff; text-align: center; width: 100%;">Chargement des modules du Shadow Market...</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
    const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzdXZpbXhqbWppbGpudG1nYnp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njk0NTgsImV4cCI6MjA5ODA0NTQ1OH0.F6aDK6oTyp3Tlb9fmkqpzgn4KGAxA5-ClIKlkqzfcR4'.trim();
    
    const supabaseClient = supabase.createClient(supabaseUrl, apiKey);

    async function loadProducts() {
      const container = document.getElementById('products-container');
      
      try {
        // Lecture complète des colonnes de ta table products
        const { data: products, error } = await supabaseClient
          .from('products')
          .select('name, price, old_price, discount, stock_quantity, description, ribbon, image_url');

        if (error) throw error;

        if (!products || products.length === 0) {
          container.innerHTML = `<p style="color: #ff3333; text-align: center; width: 100%;">Aucun produit disponible en rayon pour le moment.</p>`;
          return;
        }

        // Nettoyage de la zone de chargement
        container.innerHTML = '';

        products.forEach(product => {
          // 1. Calcul et affichage du stock
          const stockNum = parseInt(product.stock_quantity) || 0;
          let stockHTML = `<p class="stock-status">Stock : ${stockNum}</p>`;
          let buyButtonHTML = `<a href="commande.html?product=${encodeURIComponent(product.name)}" class="buy-btn">AJOUTER AU PANIER</a>`;
          
          if (stockNum <= 0) {
            stockHTML = `<p class="stock-status out-of-stock">RUPTURE DE STOCK</p>`;
            buyButtonHTML = `<button class="buy-btn" disabled style="background: #222; color: #555; cursor: not-allowed; box-shadow: none;">ÉPUISÉ</button>`;
          }

          // 2. Traitement intelligent du texte du Ruban (conversion en NEW et PROMO)
          let ribbonHTML = '';
          if (product.ribbon && product.ribbon.trim() !== '') {
            let txt = product.ribbon.trim().toLowerCase();
            
            // On filtre les textes par défaut ou vides pour ne rien afficher d'inutile
            if (txt !== "ruban (ex: promo, nouveauté)" && txt !== "ruban (ex : promo, nouveauté)" && txt !== "none" && txt !== "null" && txt !== "") {
              
              // Ajustement des mots-clés demandés
              if (txt === "nouveau" || txt === "nouveauté" || txt === "new") {
                txt = "NEW";
              } else if (txt === "promo" || txt === "promotion") {
                txt = "PROMO";
              } else {
                txt = txt.toUpperCase(); // Reste en majuscule pour les autres cas particuliers
              }
              
              ribbonHTML = `<div class="ribbon-badge">${txt}</div>`;
            }
          }

          // 3. Gestion de la Devise fixée à 100% sur l'EUR (€)
          let priceHTML = `<p class="product-price">${parseFloat(product.price).toFixed(2)} EUR</p>`;
          if (product.old_price && parseFloat(product.old_price) > parseFloat(product.price)) {
            priceHTML = `
              <div class="price-wrapper">
                <span class="old-price-style">${parseFloat(product.old_price).toFixed(2)} EUR</span>
                <span class="product-price" style="margin: 0;">${parseFloat(product.price).toFixed(2)} EUR</span>
              </div>
            `;
          }

          // Récupération de l'image Supabase Storage
          const imageStyle = product.image_url 
            ? `style="background-image: url('${product.image_url}'); background-size: cover; background-position: center;"` 
            : '';

          // 4. Génération de la structure HTML finale de la carte produit
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            ${ribbonHTML}
            <div class="product-img" ${imageStyle}></div>
            <h3 class="product-name">${product.name}</h3>
            ${stockHTML}
            ${priceHTML}
            ${buyButtonHTML}
          `;

          container.appendChild(card);
        });

      } catch (err) {
        console.error("Erreur de chargement :", err);
        container.innerHTML = `<p style="color: #ff3333; text-align: center; width: 100%;">Erreur réseau lors de l'accès aux modules du Shadow Market.</p>`;
      }
    }

    // Déclenchement automatique du chargement dès le démarrage de la page
    window.onload = loadProducts;
  </script>
</body>
</html>
