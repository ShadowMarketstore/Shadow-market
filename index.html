<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <style>
    body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 120px; }
    #dynamic-header { width: 100%; padding: 45px 0; display: flex; justify-content: center; background: #0a0a0a; border-bottom: 2px solid #00ffff; margin-bottom: 25px; }
    #main-logo { width: 85%; max-height: 300px; object-fit: contain; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 10px; }
    .product-card { position: relative; border: 2px solid #00ffff; border-radius: 15px; padding: 10px; background: #111; display: flex; flex-direction: column; min-height: 400px; }
    .product-img { width: 100%; height: 160px; background-size: contain; background-position: center; background-repeat: no-repeat; border-radius: 8px; border: 1.5px solid #DC143C; background-color: #000; }
    /* Ruban de réduction */
    .discount-badge { position: absolute; top: 15px; left: 15px; background: #000; color: #fff; border: 1px solid #00ffff; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 0.8em; z-index: 20; }
    .stock-info { color: #00ffff; font-weight: bold; margin: 8px 0; }
    .old-price { text-decoration: line-through; color: #777; font-size: 0.85em; display: block; }
    .current-price { color: #ffffff; font-weight: bold; font-size: 1.3em; display: block; }
    .buy-btn { width: 100%; background: #DC143C; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: auto; }
    .buy-btn:disabled { background: #333; color: #777; }
    .floating-nav { position: fixed; bottom: 20px; left: 5%; right: 5%; background: #111; padding: 15px 25px; border-radius: 40px; border: 1px solid #00ffff; display: flex; justify-content: space-between; z-index: 1000; }
    .nav-link { text-decoration: none; color: white; font-size: 24px; }
    #cart-count { background: #00ffff; color: #000; border-radius: 50%; padding: 2px 8px; font-size: 0.7em; }
  </style>
</head>
<body>
  <header id="dynamic-header"><img id="main-logo" src="https://jsuvimxjmjiljntmgbzu.supabase.co/storage/v1/object/public/logos/site-logo.png" alt="Shadow Market"></header>
  <main><div class="products-grid" id="products-container">Chargement...</div></main>
  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="panier.html" class="nav-link">🧺 <span id="cart-count">0</span></a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = supabase.createClient('URL_SUPABASE', 'CLE_API_SUPABASE');

    async function loadData() {
      const { data: products } = await supabase.from('products').select('*');
      const container = document.getElementById('products-container');
      container.innerHTML = '';
      
      products.forEach(p => {
        const stock = p.stock_quantity ?? 0;
        const discount = p.old_price > p.price ? Math.round(((p.old_price - p.price) / p.old_price) * 100) : 0;
        
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          ${discount > 0 ? `<div class="discount-badge">-${discount}%</div>` : ''}
          <div class="product-img" style="background-image: url('${p.image_url}')"></div>
          <h3>${p.name}</h3>
          <div class="stock-info">Stock : ${stock > 0 ? stock : 'Épuisé'}</div>
          ${p.old_price > p.price ? `<span class="old-price">${p.old_price} EUR</span>` : ''}
          <span class="current-price">${p.price} EUR</span>
          <button class="buy-btn" ${stock <= 0 ? 'disabled' : ''} onclick="addToCart(${p.id}, ${stock})">
            ${stock <= 0 ? 'ÉPUISÉ' : 'AJOUTER AU PANIER'}
          </button>
        `;
        container.appendChild(card);
      });
    }

    async function addToCart(id, currentStock) {
      // 1. Décrémentation Supabase
      await supabase.from('products').update({ stock_quantity: currentStock - 1 }).eq('id', id);
      // 2. Mise à jour locale (ajout dans panier)
      // ... logique d'ajout au panier ...
      loadData();
    }

    window.onload = loadData;
  </script>
</body>
</html>
