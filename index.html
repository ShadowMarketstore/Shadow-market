<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styles existants conservés + styles panier */
    .product-card { position: relative; overflow: hidden; }
    .ribbon-badge { position: absolute; top: 14px; right: -32px; background: #00ffff; color: #000; font-size: 0.72em; font-weight: bold; padding: 4px 32px; transform: rotate(45deg); box-shadow: 0 0 8px #00ffff; text-transform: uppercase; z-index: 10; }
    .price-wrapper { display: flex; flex-direction: column; gap: 2px; margin-bottom: 10px; }
    .old-price-style { color: #666; text-decoration: line-through; font-size: 0.85em; }
    .stock-status { font-size: 0.8em; color: #888; margin-bottom: 8px; }
    .out-of-stock { color: #ff3333 !important; font-weight: bold; }
    
    /* Style Panier Flottant */
    #cart-icon { position: fixed; bottom: 20px; right: 20px; background: #00ffff; color: #000; padding: 15px; border-radius: 50%; cursor: pointer; z-index: 1000; font-size: 20px; box-shadow: 0 0 15px #00ffff; }
    #cart-modal { display: none; position: fixed; bottom: 80px; right: 20px; width: 280px; background: #111; border: 1px solid #00ffff; padding: 15px; color: white; border-radius: 10px; z-index: 999; }
  </style>
</head>
<body>

  <div id="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
  <div id="cart-modal">
    <h3>Panier</h3>
    <div id="cart-items" style="max-height: 200px; overflow-y: auto;"></div>
    <hr style="border: 0.5px solid #333;">
    <p>Total: <span id="cart-total">0</span> EUR</p>
    <button onclick="window.location.href='commande.html'" style="width: 100%; background: #00ffff; border: none; padding: 10px; font-weight: bold; cursor: pointer;">PAYER</button>
  </div>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="commande.html" class="nav-link">🛒</a>
    <a href="index.html" class="nav-link active">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <div class="main-content-wrapper">
    <header><div class="logo-wrapper"><img src="logo.png" alt="Shadow Market"></div></header>
    <main>
      <h1 class="section-title">Produits Disponibles</h1>
      <div class="products-grid" id="products-container"><p style="color: #00ffff; text-align: center;">Chargement...</p></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://jsuvimxjmjiljntmgbzu.supabase.co', 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX');

    // Gestion du panier
    function toggleCart() { const m = document.getElementById('cart-modal'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    
    function ajouterAuPanier(nom, prix) {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      panier.push({ nom, prix });
      localStorage.setItem('monPanier', JSON.stringify(panier));
      updateCartDisplay();
    }

    function updateCartDisplay() {
      let panier = JSON.parse(localStorage.getItem('monPanier')) || [];
      let container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;
      panier.forEach(item => {
        container.innerHTML += `<p>${item.nom} - ${item.prix} EUR</p>`;
        total += parseFloat(item.prix);
      });
      document.getElementById('cart-count').innerText = panier.length;
      document.getElementById('cart-total').innerText = total.toFixed(2);
    }

    async function loadProducts() {
      const container = document.getElementById('products-container');
      const { data: products, error } = await supabaseClient.from('products').select('*');
      
      if (error) { container.innerHTML = "Erreur chargement."; return; }
      container.innerHTML = '';
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-img" style="background-image: url('${p.image_url}')"></div>
          <h3>${p.name}</h3>
          <p>${p.price} EUR</p>
          <button class="buy-btn" onclick="ajouterAuPanier('${p.name}', ${p.price})">AJOUTER AU PANIER</button>
        `;
        container.appendChild(card);
      });
      updateCartDisplay();
    }
    window.onload = loadProducts;
  </script>
</body>
</html>
