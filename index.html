<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Market - Boutique Officielle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-wrapper">
            <img src="ton-logo.png" alt="Shadow Market Logo" class="logo-image">
        </div>
    </header>

    <main class="store-content">
        <h2 class="section-title">Produits Disponibles</h2>
        <div class="products-grid" id="product-list">
            
            <div class="product-card">
                <div class="product-visual"></div>
                <div class="product-details">
                    <h3 class="product-name">Nom du Produit</h3>
                    <p class="product-price">0.00 XOF</p>
                    <button class="buy-button">Voir le produit</button>
                </div>
            </div>

            </div>
    </main>

</body>
</html>
