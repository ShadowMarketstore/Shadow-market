<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Commande</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="commande.html" class="nav-link active">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <main class="main-content-wrapper">
    <h1 class="section-title">Passer une commande</h1>

    <form id="orderForm" class="order-form">
      <div class="form-group">
        <label>Ton Email (pour te contacter)</label>
        <input type="email" id="c-email" placeholder="email@exemple.com" required>
      </div>
      <div class="form-group">
        <label>Marque & Modèle</label>
        <input type="text" id="modele" placeholder="Ex: HP ProBook 4440S" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>RAM (Go)</label>
          <input type="number" id="ram" placeholder="8" required>
        </div>
        <div class="form-group">
          <label>Stockage</label>
          <input type="text" id="stockage" placeholder="350 Go SSD" required>
        </div>
      </div>

      <div class="form-group">
        <label>Système d'exploitation</label>
        <select id="os" class="custom-select">
          <option value="Windows 10">Windows 10</option>
          <option value="Windows 11">Windows 11</option>
          <option value="Linux">Linux</option>
        </select>
      </div>

      <div class="form-group">
        <label>Carte Graphique</label>
        <input type="text" id="gpu" placeholder="Ex: Intel HD Graphics">
      </div>

      <div class="form-group">
        <label>Message pour le support</label>
        <textarea id="message" rows="4" placeholder="Décrivez vos besoins..."></textarea>
      </div>

      <button type="submit" class="submit-btn">ENVOYER LA DEMANDE</button>
    </form>
  </main>

  <script>
    const supabase = supabase.createClient(
        'https://jsuvimxjmjiljntmgbzu.supabase.co', 
        'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX'
    );

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // On récupère exactement les mêmes champs que tu avais
      const orderData = {
        customer_email: document.getElementById('c-email').value,
        modele: document.getElementById('modele').value,
        ram: document.getElementById('ram').value,
        stockage: document.getElementById('stockage').value,
        os: document.getElementById('os').value,
        gpu: document.getElementById('gpu').value,
        message: document.getElementById('message').value,
        status: 'en attente' // Indispensable pour ton Admin
      };

      const { error } = await supabase.from('orders').insert([orderData]);

      if (error) {
        alert("Erreur lors de l'envoi : " + error.message);
      } else {
        alert("Commande envoyée avec succès !");
        document.getElementById('orderForm').reset();
      }
    });
  </script>
</body>
</html>
