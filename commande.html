<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Commande</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="floating-nav">
    <a href="account.html" class="nav-link">👤</a>
    <a href="commande.html" class="nav-link active">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <main class="main-content-wrapper">
    <h1 class="section-title">Passer une commande</h1>

    <form class="order-form">
      <div class="form-group">
        <label>Marque & Modèle</label>
        <input type="text" placeholder="Ex: HP ProBook 4440S" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>RAM (Go)</label>
          <input type="number" placeholder="8" required>
        </div>
        <div class="form-group">
          <label>Stockage</label>
          <input type="text" placeholder="350 Go SSD" required>
        </div>
      </div>

      <div class="form-group">
        <label>Système d'exploitation</label>
        <select class="custom-select">
          <option value="win10">Windows 10</option>
          <option value="win11">Windows 11</option>
          <option value="win8">Windows 8</option>
          <option value="linux">Linux</option>
        </select>
      </div>

      <div class="form-group">
        <label>Carte Graphique</label>
        <input type="text" placeholder="Ex: Intel HD Graphics">
      </div>

      <div class="form-group">
        <label>Message pour le support</label>
        <textarea rows="4" placeholder="Décrivez vos besoins (jeux, optimisation, etc...)"></textarea>
      </div>

      <button type="submit" class="submit-btn">ENVOYER LA DEMANDE</button>
    </form>
  </main>

</body>
</html>
