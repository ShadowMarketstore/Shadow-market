<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Market - Commande</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="floating-nav">
    <a href="login.html" class="nav-link">👤</a>
    <a href="commande.html" class="nav-link active">🛒</a>
    <a href="index.html" class="nav-link">🏠</a>
    <a href="https://discord.gg/XUtWdTPYr" target="_blank" class="nav-link">💬</a>
  </nav>

  <main class="main-content-wrapper">
    <h1 class="section-title">Passer une commande</h1>

    <form id="orderForm" class="order-form">
      <div class="form-group">
        <label>Ton Email</label>
        <input type="email" id="c-email" placeholder="email@exemple.com" required>
      </div>
      <div class="form-group">
        <label>Marque & Modèle</label>
        <input type="text" id="modele" placeholder="Ex: HP ProBook 4440S" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>RAM (Go)</label>
          <input type="number" id="ram" placeholder="8" required>
        </div>
        <div class="form-group">
          <label>Stockage</label>
          <input type="text" id="stockage" placeholder="350 Go SSD" required>
        </div>
      </div>
      <div class="form-group">
        <label>Système d'exploitation</label>
        <select id="os" class="custom-select">
          <option value="Windows 10">Windows 10</option>
          <option value="Windows 11">Windows 11</option>
          <option value="Linux">Linux</option>
        </select>
      </div>
      <div class="form-group">
        <label>Carte Graphique</label>
        <input type="text" id="gpu" placeholder="Ex: Intel HD Graphics">
      </div>
      <div class="form-group">
        <label>Message pour le support</label>
        <textarea id="message" rows="4" placeholder="Décrivez vos besoins..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">ENVOYER LA DEMANDE</button>
    </form>
  </main>

  <script>
    // Initialisation sécurisée
    const SUPABASE_URL = 'https://jsuvimxjmjiljntmgbzu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Ngm29impwbTLGhuqyCxSJA_E1jXc1DX';
    
    // Attendre que la page soit chargée
    window.addEventListener('load', () => {
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Envoi en cours...";
            btn.disabled = true;

            const orderData = {
                customer_email: document.getElementById('c-email').value,
                modele: document.getElementById('modele').value,
                ram: document.getElementById('ram').value,
                stockage: document.getElementById('stockage').value,
                os: document.getElementById('os').value,
                gpu: document.getElementById('gpu').value,
                message: document.getElementById('message').value,
                status: 'en attente'
            };

            const { error } = await supabaseClient.from('orders').insert([orderData]);

            if (error) {
                alert("Erreur Supabase : " + error.message);
                console.error("Détail :", error);
            } else {
                alert("Commande envoyée avec succès !");
                document.getElementById('orderForm').reset();
            }
            btn.innerText = "ENVOYER LA DEMANDE";
            btn.disabled = false;
        });
    });
  </script>
  
  <div id="successPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#28a745; padding:40px; border-radius:20px; text-align:center; color:#fff; border:3px solid #fff;">
        <div style="font-size: 60px;">✅</div>
        <h2 style="margin-top:10px;">COMMANDE VALIDÉE</h2>
        <p>Nous avons bien reçu votre demande.</p>
    </div>
</div>

</body>
</html>
